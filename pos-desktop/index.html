<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataPulse POS</title>
    <!-- CSP — allows Clerk auth (script + iframe + connect), the DataPulse API,
         Sentry telemetry, and self-hosted assets. file:// origins normalize 'self'
         differently across Chromium versions, so explicit allowlists are safer
         than relying on 'self' alone for the renderer bundle. -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' data: blob:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.clerk.com https://*.clerk.accounts.dev https://*.clerk.dev https://challenges.cloudflare.com;
        connect-src 'self' http://localhost:* https://*.smartdatapulse.tech https://*.sentry.io https://*.clerk.com https://*.clerk.accounts.dev https://*.clerk.dev https://api.clerk.com;
        frame-src 'self' https://*.clerk.com https://*.clerk.accounts.dev https://*.clerk.dev https://challenges.cloudflare.com;
        img-src 'self' data: blob: https://*.clerk.com https://img.clerk.com https://*.gravatar.com;
        worker-src 'self' blob:;
        style-src 'self' 'unsafe-inline';
        font-src 'self' data:;" />
  </head>
  <body class="pos-omni">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
