name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install Python dependencies
        run: pip install -e "."
      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci
      - name: Audit npm dependencies
        working-directory: frontend
        run: npm audit --audit-level=critical

  secret-scan:
    name: Secret Scanner (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bandit:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Run Bandit
        run: |
          pip install "bandit[toml]"
          bandit -r src/ -ll -c pyproject.toml

  sbom-license:
    name: SBOM & License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install project
        run: pip install -e "."

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Check licenses
        run: |
          pip install pip-licenses
          pip-licenses --format=csv --output-file=licenses.csv
          # Warn on copyleft licenses in production deps
          COPYLEFT=$(pip-licenses --allow-only="MIT;BSD-2-Clause;BSD-3-Clause;Apache-2.0;ISC;Python-2.0;PSF-2.0;MPL-2.0;LGPL-2.1-only;LGPL-3.0-only;Unlicense;Public Domain" 2>&1 || true)
          if echo "$COPYLEFT" | grep -q "not allowed"; then
            echo "::warning::Found dependencies with non-permissive licenses:"
            echo "$COPYLEFT"
          fi
