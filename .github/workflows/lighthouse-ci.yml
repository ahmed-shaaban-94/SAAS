name: Lighthouse CI

on:
  pull_request:
    paths:
      - "frontend/src/app/(pos)/**"
      - "frontend/src/components/pos/**"

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          # Stub env vars required by the build but not needed for Lighthouse
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_lighthouse
          CLERK_SECRET_KEY: sk_test_lighthouse

      - name: Copy static assets for standalone server
        run: |
          cp -r frontend/public frontend/.next/standalone/public
          cp -r frontend/.next/static frontend/.next/standalone/.next/static

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: frontend/.lighthouserc.json
          uploadArtifacts: false
          temporaryPublicStorage: false
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_lighthouse
          CLERK_SECRET_KEY: sk_test_lighthouse
