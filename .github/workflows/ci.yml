name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install ruff
      - name: Check linting
        run: ruff check src/ tests/
      - name: Check formatting
        run: ruff format --check src/ tests/
      - name: Check migration integrity (no duplicate prefixes)
        # Issue #538: guards against duplicate migration numbers that a
        # prefix-keyed runner can silently skip. Uses stdlib only — no deps.
        run: python scripts/check_migration_numbers.py
      - name: Check api-layer imports (no new violations)
        # Issue #541: forbids business modules from importing datapulse.api.*.
        # Grandfathered offenders are listed in
        # scripts/.known-api-layer-violations. Uses stdlib only — no deps.
        run: python scripts/check_api_layer_imports.py
      - name: Migration safety lint (PR-changed migrations only)
        # Issue #608: flags dangerous DDL (ADD COLUMN NOT NULL, CREATE INDEX
        # without CONCURRENTLY, ALTER COLUMN TYPE, TRUNCATE) on any migration
        # file changed in this PR. Uses stdlib only — no deps.
        # Runs on push to main too so unreviewed merges are still caught.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep '^migrations/.*\.sql$' || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD \
              | grep '^migrations/.*\.sql$' || true)
          fi
          if [ -z "$CHANGED" ]; then
            echo "No migration files changed — skipping safety lint."
          else
            echo "Checking migrations: $CHANGED"
            python scripts/check_migration_safety.py $CHANGED
          fi
      - name: Canonical docs drift check
        # Issue #660: README.md + docs/ARCHITECTURE.md must stay aligned with the
        # current auth provider (Clerk) and frontend major (Next.js 15). Stdlib
        # only — no deps.
        run: python scripts/check_docs_truth_sources.py

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install "mypy>=1.14,<2" types-redis types-passlib types-python-jose
      - name: Run mypy
        run: mypy src/datapulse/

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-timeout
      - name: Run unit tests
        timeout-minutes: 15
        env:
          DATABASE_URL: "sqlite:///:memory:"
          REDIS_URL: ""
          SENTRY_ENVIRONMENT: test
          PYTHONFAULTHANDLER: "1"
        # Coverage floor aligned with pyproject.toml and `make coverage`.
        # Current measured unit coverage on main is ~79%; gate is floor-2 to
        # allow normal variance without masking real regressions (issue #540).
        run: pytest -m unit --timeout=120 --cov=datapulse --cov-report=term-missing --cov-report=xml --cov-fail-under=77 -x -q
      - name: Per-module coverage gates (issue #607)
        # Checks security-critical modules (core/auth, jwt, rbac, billing, pos)
        # against higher individual thresholds defined in pyproject.toml.
        # Reports which module fell below threshold, not just "overall dropped".
        run: python scripts/check_coverage_gates.py coverage.xml
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: datapulse
          POSTGRES_PASSWORD: datapulse
          POSTGRES_DB: datapulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-timeout
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://datapulse:datapulse@localhost:5432/datapulse
          PGPASSWORD: datapulse
        run: |
          set -euo pipefail
          for f in migrations/*.sql; do
            echo "Applying $f..."
            psql -h localhost -U datapulse -d datapulse \
              -v ON_ERROR_STOP=1 \
              -c "SET app.db_reader_password = 'ci_reader_pass';" \
              -f "$f"
          done
      - name: Run integration tests
        timeout-minutes: 10
        env:
          DATABASE_URL: postgresql://datapulse:datapulse@localhost:5432/datapulse
          REDIS_URL: redis://localhost:6379/0
          SENTRY_ENVIRONMENT: test
          PYTHONFAULTHANDLER: "1"
          # Required by tests that build a datapulse_reader DSN (e.g.
          # test_audit_log_immutability, test_db_role_timeouts). Must match
          # the value used in the "Run migrations" step above.
          DB_READER_PASSWORD: ci_reader_pass
        # Integration gate stays at 40 for now — can't measure locally
        # without Postgres, so we keep the historic number rather than
        # guess. Raising this is tracked as a follow-up to #540.
        run: pytest -m integration --timeout=120 --cov=datapulse --cov-report=term-missing --cov-report=xml --cov-fail-under=40
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: integration
          fail_ci_if_error: false

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Unit tests
        working-directory: frontend
        run: npx vitest run --coverage
      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          # Point API proxy to localhost instead of the Docker service name
          # "api" so that rewrite failures resolve instantly (ECONNREFUSED)
          # rather than hanging on DNS (EAI_AGAIN).
          INTERNAL_API_URL: "http://localhost:8000"
      - name: Prepare standalone server
        working-directory: frontend
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --reporter=html --retries=3
        timeout-minutes: 20
        env:
          CI: "true"
          # Dummy NextAuth config — no real Auth0 in CI.
          # NEXTAUTH_SECRET: prevents MissingSecretError in standalone build.
          # AUTH0_DOMAIN: set to localhost so refreshAccessToken() hits a
          #   reachable host (returns 404, caught gracefully) instead of the
          #   unresolvable Docker service name that causes EAI_AGAIN errors.
          NEXTAUTH_SECRET: "ci-e2e-placeholder-not-for-production"
          NEXTAUTH_URL: "http://localhost:3000"
          AUTH0_DOMAIN: "localhost:3000"
          AUTH0_CLIENT_ID: "ci-client-id"
          AUTH0_CLIENT_SECRET: "ci-client-secret"
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .
            dockerfile: Dockerfile
            target: api
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            target: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dbt-validate:
    name: dbt Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: datapulse
          POSTGRES_PASSWORD: datapulse
          POSTGRES_DB: datapulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - uses: actions/cache@v5
        with:
          path: dbt/dbt_packages
          key: dbt-packages-${{ hashFiles('dbt/packages.yml') }}
      - name: Install dbt
        run: pip install "dbt-core>=1.8" "dbt-postgres>=1.8"
      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps
        env:
          DBT_HOST: localhost
          POSTGRES_PASSWORD: datapulse
      - name: Validate dbt models
        working-directory: dbt
        run: dbt parse
        env:
          DBT_HOST: localhost
          POSTGRES_PASSWORD: datapulse

  # ── Real-backend E2E gate (issue #656) ──────────────────────────────────────
  # Boots the full FastAPI + PostgreSQL + Redis stack and exercises the
  # golden-path API calls without any page.route() mocks. This is the
  # release-gating lane the UI-only E2E job cannot provide.
  #
  # Auth: X-API-Key (no Clerk required — safe for CI). FastAPI runs in
  # development mode so JWT issuer is optional; API_KEY enforces tenant scope.
  e2e-real-backend:
    name: E2E Real Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: datapulse
          POSTGRES_PASSWORD: datapulse
          POSTGRES_DB: datapulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install Python dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://datapulse:datapulse@localhost:5432/datapulse
          PGPASSWORD: datapulse
        run: |
          set -euo pipefail
          for f in migrations/*.sql; do
            psql -h localhost -U datapulse -d datapulse \
              -v ON_ERROR_STOP=1 \
              -c "SET app.db_reader_password = 'ci_reader_pass';" \
              -f "$f"
          done
      - name: Start FastAPI (background, dev + API-key mode)
        env:
          DATABASE_URL: postgresql://datapulse:datapulse@localhost:5432/datapulse
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: development
          SENTRY_ENVIRONMENT: development
          # API key authenticates E2E tests; DEFAULT_TENANT_ID routes them to
          # tenant 1, seeded by migration 003.
          API_KEY: ci-e2e-test-key-for-ci-only
          DEFAULT_TENANT_ID: "1"
          DB_READER_PASSWORD: ci_reader_pass
          # Disable the APScheduler background scheduler so the lifespan
          # startup is instant. Scheduled jobs are not needed for smoke tests
          # and the sync DB calls inside start_scheduler() would block the
          # asyncio event loop, delaying uvicorn startup by 10–15 s.
          SCHEDULER_ENABLED: "false"
          # No CLERK_JWT_ISSUER — dev mode; JWT bearer validation is skipped.
        run: |
          uvicorn datapulse.api.app:create_app \
            --factory --host 0.0.0.0 --port 8000 \
            --workers 1 --no-access-log \
            > /tmp/uvicorn.log 2>&1 &
          echo "API PID=$!" >> "$GITHUB_ENV"
      - name: Wait for API to be ready
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health/live > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become ready within 60 s"
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run real-backend API smoke tests
        working-directory: frontend
        timeout-minutes: 15
        env:
          E2E_API_URL: "http://localhost:8000"
          E2E_API_KEY: "ci-e2e-test-key-for-ci-only"
        run: >
          npx playwright test
          --config playwright.real-backend.config.ts
          --reporter=html
      - name: Dump uvicorn log on failure
        if: failure()
        run: |
          echo "──────── uvicorn stdout+stderr ────────"
          tail -n 400 /tmp/uvicorn.log || echo "(log file missing)"
      - name: Upload real-backend E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-real-backend
          path: frontend/playwright-report/
          retention-days: 14

  # ── Merge gate ──────────────────────────────────────────────────────────
  # Single required status check for branch protection.
  # Add "CI Gate" as a required check in GitHub Settings > Branch protection.
  # This ensures NO PR merges unless every CI job passes.
  ci-gate:
    name: CI Gate
    if: always()
    needs: [lint, typecheck, test-unit, test-integration, frontend, e2e, e2e-real-backend, docker-build, dbt-validate]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          echo "Job results:"
          echo "  lint:                ${{ needs.lint.result }}"
          echo "  typecheck:           ${{ needs.typecheck.result }}"
          echo "  test-unit:           ${{ needs.test-unit.result }}"
          echo "  test-integration:    ${{ needs.test-integration.result }}"
          echo "  frontend:            ${{ needs.frontend.result }}"
          echo "  e2e:                 ${{ needs.e2e.result }}"
          echo "  e2e-real-backend:    ${{ needs.e2e-real-backend.result }}"
          echo "  docker-build:        ${{ needs.docker-build.result }}"
          echo "  dbt-validate:        ${{ needs.dbt-validate.result }}"

          # Fail if ANY upstream job did not succeed
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test-unit.result }}" != "success" ]] || \
             [[ "${{ needs.test-integration.result }}" != "success" ]] || \
             [[ "${{ needs.frontend.result }}" != "success" ]] || \
             [[ "${{ needs.e2e.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-real-backend.result }}" != "success" ]] || \
             [[ "${{ needs.docker-build.result }}" != "success" ]] || \
             [[ "${{ needs.dbt-validate.result }}" != "success" ]]; then
            echo ""
            echo "::error::CI Gate FAILED — one or more jobs did not pass. PR must not be merged."
            exit 1
          fi
          echo ""
          echo "All CI jobs passed. Safe to merge."
