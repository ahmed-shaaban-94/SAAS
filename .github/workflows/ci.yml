name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install ruff
      - name: Check linting
        run: ruff check src/ tests/
      - name: Check formatting
        run: ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy types-redis
      - name: Run mypy
        run: mypy src/datapulse/ --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: datapulse
          POSTGRES_PASSWORD: datapulse
          POSTGRES_DB: datapulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run tests
        env:
          DATABASE_URL: postgresql://datapulse:datapulse@localhost:5432/datapulse
        run: pytest --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=88
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Unit tests
        working-directory: frontend
        run: npx vitest run --coverage
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .
            dockerfile: Dockerfile
            target: api
          - service: app
            context: .
            dockerfile: Dockerfile
            target: app
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            target: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dbt-validate:
    name: dbt Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: datapulse
          POSTGRES_PASSWORD: datapulse
          POSTGRES_DB: datapulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - uses: actions/cache@v4
        with:
          path: dbt/dbt_packages
          key: dbt-packages-${{ hashFiles('dbt/packages.yml') }}
      - name: Install dbt
        run: pip install "dbt-core>=1.8" "dbt-postgres>=1.8"
      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps || true
        env:
          DBT_HOST: localhost
          POSTGRES_PASSWORD: datapulse
      - name: Validate dbt models
        working-directory: dbt
        run: dbt parse
        env:
          DBT_HOST: localhost
          POSTGRES_PASSWORD: datapulse
