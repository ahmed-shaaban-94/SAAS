name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install ruff
      - name: Check linting
        run: ruff check src/ tests/
      - name: Check formatting
        run: ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install "mypy<1.14" types-redis types-passlib types-python-jose
      - name: Run mypy
        run: mypy src/datapulse/

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SENTRY_ENVIRONMENT: test
        run: pytest -m unit --cov --cov-report=term-missing --cov-fail-under=45 -x -q

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: datapulse
          POSTGRES_PASSWORD: datapulse
          POSTGRES_DB: datapulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://datapulse:datapulse@localhost:5432/datapulse
          PGPASSWORD: datapulse
        run: |
          for f in migrations/*.sql; do
            echo "Applying $f..."
            psql -h localhost -U datapulse -d datapulse -f "$f" 2>&1 || true
          done
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://datapulse:datapulse@localhost:5432/datapulse
          REDIS_URL: redis://localhost:6379/0
          SENTRY_ENVIRONMENT: test
        run: pytest -m integration --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=50
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Unit tests
        working-directory: frontend
        run: npx vitest run --coverage
      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          # Point API proxy to localhost instead of the Docker service name
          # "api" so that rewrite failures resolve instantly (ECONNREFUSED)
          # rather than hanging on DNS (EAI_AGAIN).
          INTERNAL_API_URL: "http://localhost:8000"
      - name: Prepare standalone server
        working-directory: frontend
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --reporter=html --retries=3
        timeout-minutes: 20
        env:
          CI: "true"
          # Dummy NextAuth config — no real Auth0 in CI.
          # NEXTAUTH_SECRET: prevents MissingSecretError in standalone build.
          # AUTH0_DOMAIN: set to localhost so refreshAccessToken() hits a
          #   reachable host (returns 404, caught gracefully) instead of the
          #   unresolvable Docker service name that causes EAI_AGAIN errors.
          NEXTAUTH_SECRET: "ci-e2e-placeholder-not-for-production"
          NEXTAUTH_URL: "http://localhost:3000"
          AUTH0_DOMAIN: "localhost:3000"
          AUTH0_CLIENT_ID: "ci-client-id"
          AUTH0_CLIENT_SECRET: "ci-client-secret"
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .
            dockerfile: Dockerfile
            target: api
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            target: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dbt-validate:
    name: dbt Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: datapulse
          POSTGRES_PASSWORD: datapulse
          POSTGRES_DB: datapulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - uses: actions/cache@v4
        with:
          path: dbt/dbt_packages
          key: dbt-packages-${{ hashFiles('dbt/packages.yml') }}
      - name: Install dbt
        run: pip install "dbt-core>=1.8" "dbt-postgres>=1.8"
      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps || true
        env:
          DBT_HOST: localhost
          POSTGRES_PASSWORD: datapulse
      - name: Validate dbt models
        working-directory: dbt
        run: dbt parse
        env:
          DBT_HOST: localhost
          POSTGRES_PASSWORD: datapulse
