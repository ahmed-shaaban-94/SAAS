name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: latest

jobs:
  gate:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed — deploying to production"

  build-push:
    name: Build & Push (${{ matrix.service }})
    needs: [gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            context: .
            target: api
          - service: frontend
            context: ./frontend
            target: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/saas/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/saas/${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    needs: [build-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,nginx/,migrations/,postgres/"
          target: ${{ secrets.PROD_DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR
          script: |
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Pull latest images
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull api frontend

            # Deploy with latest images
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --remove-orphans

            # Wait for containers to start, then verify health with retries
            echo "=== Waiting for services ==="
            for i in $(seq 1 6); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:3000 || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Health check PASSED on attempt $i (HTTP $HTTP_CODE)"
                break
              fi
              echo "Attempt $i: HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done

            echo "=== Container Status ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              ps

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::Health check failed after 6 attempts (HTTP $HTTP_CODE)"
            fi
