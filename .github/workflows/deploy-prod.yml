name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest staging tag)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # Never cancel an in-flight prod deploy — could leave deployment half-done

env:
  REGISTRY: ghcr.io

jobs:
  gate:
    name: Verify Staging Success
    runs-on: ubuntu-latest
    steps:
      - name: Check latest staging deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Verifying staging deployment succeeded..."

          # Check staging workflow status
          RESULT=$(gh api \
            repos/${{ github.repository }}/actions/workflows/deploy-staging.yml/runs \
            --jq '.workflow_runs[0] | {status: .status, conclusion: .conclusion}' \
            2>/dev/null || echo '{"status":"unknown","conclusion":"unknown"}')

          echo "Latest staging run: $RESULT"

          CONCLUSION=$(echo "$RESULT" | jq -r '.conclusion')
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Staging deploy has not succeeded (conclusion: $CONCLUSION). Blocking production deploy."
            exit 1
          fi

  build-push:
    name: Build & Push Images
    needs: [gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            context: .
            target: api
          - service: app
            context: .
            target: app
          - service: frontend
            context: ./frontend
            target: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/saas/${{ matrix.service }}:production
            ghcr.io/${{ github.repository_owner }}/saas/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,nginx/,migrations/,postgres/"
          target: ${{ secrets.PROD_DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            # Pull latest production images (no git operations — compose files copied via SCP)
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --remove-orphans

            # Wait for containers to start, then verify with retries
            echo "=== Waiting for services ==="
            for i in $(seq 1 6); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:8000/health || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Health check PASSED on attempt $i (HTTP $HTTP_CODE)"
                break
              fi
              echo "Attempt $i: HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done

            echo "=== Container Status ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              ps

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::error::Production health check failed after 6 attempts (HTTP $HTTP_CODE)"
              exit 1
            fi
