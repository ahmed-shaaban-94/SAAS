name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: false
        default: 'staging'
        type: string
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # Never cancel an in-flight prod deploy

env:
  REGISTRY: ghcr.io

jobs:
  gate:
    name: Verify Staging Success
    runs-on: ubuntu-latest
    steps:
      - name: Check latest staging deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Verifying staging deployment succeeded..."

          RESULT=$(gh api \
            repos/${{ github.repository }}/actions/workflows/deploy-staging.yml/runs \
            --jq '.workflow_runs[0] | {status: .status, conclusion: .conclusion}' \
            2>/dev/null || echo '{"status":"unknown","conclusion":"unknown"}')

          echo "Latest staging run: $RESULT"

          CONCLUSION=$(echo "$RESULT" | jq -r '.conclusion')
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Staging deploy has not succeeded (conclusion: $CONCLUSION). Blocking production deploy."
            exit 1
          fi

  build-push:
    name: Build & Push Images
    needs: [gate]
    if: ${{ needs.gate.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    strategy:
      matrix:
        include:
          - service: api
            context: .
            target: api
          - service: frontend
            context: ./frontend
            target: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/data-pulse/${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_ENVIRONMENT=production

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/data-pulse/${{ matrix.service }}:scan
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Push image (scan passed)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/data-pulse/${{ matrix.service }}:production
            ghcr.io/${{ github.repository_owner }}/data-pulse/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_ENVIRONMENT=production

  deploy:
    name: Deploy to Production
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,docker-compose.monitoring.yml,nginx/,migrations/,postgres/,monitoring/"
          target: ${{ secrets.PROD_DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          API_KEY: ${{ secrets.API_KEY }}
          PIPELINE_WEBHOOK_SECRET: ${{ secrets.PIPELINE_WEBHOOK_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DB_READER_PASSWORD: ${{ secrets.DB_READER_PASSWORD }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: API_KEY,PIPELINE_WEBHOOK_SECRET,NEXTAUTH_SECRET,POSTGRES_PASSWORD,REDIS_PASSWORD,DB_READER_PASSWORD
          script: |
            set -e
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            export IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}"
            # Secrets are available as env vars (passed via envs: — not in shell history)
            export API_KEY PIPELINE_WEBHOOK_SECRET NEXTAUTH_SECRET POSTGRES_PASSWORD REDIS_PASSWORD DB_READER_PASSWORD

            # Save current state for rollback
            echo "=== Saving rollback state ==="
            PREV_API_IMAGE=$(docker inspect --format='{{.Image}}' datapulse-api 2>/dev/null || echo "none")
            PREV_FE_IMAGE=$(docker inspect --format='{{.Image}}' datapulse-frontend 2>/dev/null || echo "none")
            echo "Previous API: $PREV_API_IMAGE"
            echo "Previous Frontend: $PREV_FE_IMAGE"

            # Pull latest production images
            echo "=== Pulling new images ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.monitoring.yml \
              pull

            # Deploy in two phases:
            # 1. Bring up infra (postgres, redis) normally — no recreate needed
            # 2. Force-recreate app services so nginx picks up new upstreams.
            echo "=== Starting deployment ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.monitoring.yml \
              up -d --remove-orphans postgres redis
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.monitoring.yml \
              up -d --remove-orphans --force-recreate api frontend nginx

            # Health check — API liveness via nginx internal port.
            # Uses /health/live (always 200 if process is alive) not /health
            # (returns 503 until DB is ready). Readiness is tested in smoke tests.
            echo "=== Health check: API ==="
            API_OK=false
            for i in $(seq 1 24); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:8080/health/live 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "API health check PASSED on attempt $i"
                API_OK=true
                break
              fi
              echo "Attempt $i: API HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done

            # Health check — Frontend via HTTPS (tests full nginx → frontend path)
            echo "=== Health check: Frontend ==="
            FE_OK=false
            for i in $(seq 1 12); do
              HTTP_CODE=$(curl -skL -o /dev/null -w '%{http_code}' --connect-timeout 5 -H "Host: smartdatapulse.tech" https://localhost 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Frontend health check PASSED on attempt $i"
                FE_OK=true
                break
              fi
              echo "Attempt $i: Frontend HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done

            # Smoke tests
            echo "=== Smoke tests ==="
            SMOKE_OK=true

            READY=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health/ready 2>/dev/null || echo "000")
            if [ "$READY" != "200" ]; then
              echo "FAIL: /health/ready → $READY"
              SMOKE_OK=false
            else
              echo "PASS: /health/ready"
            fi

            # Check DB connectivity via health/ready (returns 503 if DB down)
            HEALTH_BODY=$(curl -s http://localhost:8080/health/ready 2>/dev/null || echo "{}")
            echo "Health response: $HEALTH_BODY"

            echo "=== Container Status ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.monitoring.yml \
              ps

            # Rollback if failed
            if [ "$API_OK" != "true" ] || [ "$FE_OK" != "true" ] || [ "$SMOKE_OK" != "true" ]; then
              echo "::error::Production deploy FAILED — initiating rollback"
              echo "API: $API_OK | Frontend: $FE_OK | Smoke: $SMOKE_OK"

              # Dump logs for debugging
              echo "=== API Logs (last 80 lines) ==="
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                -f docker-compose.monitoring.yml \
                logs --tail=80 api 2>&1 || true

              echo "=== Frontend Logs (last 40 lines) ==="
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                -f docker-compose.monitoring.yml \
                logs --tail=40 frontend 2>&1 || true

              echo "=== Postgres Logs (last 20 lines) ==="
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                -f docker-compose.monitoring.yml \
                logs --tail=20 postgres 2>&1 || true

              # Rollback
              if [ "$PREV_API_IMAGE" != "none" ]; then
                echo "=== Rolling back ==="
                docker compose \
                  -f docker-compose.yml \
                  -f docker-compose.prod.yml \
                  -f docker-compose.monitoring.yml \
                  down --remove-orphans
                docker compose \
                  -f docker-compose.yml \
                  -f docker-compose.prod.yml \
                  -f docker-compose.monitoring.yml \
                  up -d

                # Verify rollback
                sleep 15
                ROLLBACK_CHECK=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:8080/health/live 2>/dev/null || echo "000")
                echo "Rollback health check: HTTP $ROLLBACK_CHECK"
              fi
              exit 1
            fi

            echo "=== Production deploy SUCCESSFUL ==="

  # ── Step 4: Notify deploy result via Slack ────────────────────────────
  notify:
    name: Notify Deploy Result
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_DEPLOY_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi

          STATUS="${{ needs.deploy.result }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            TEXT="*Production deploy succeeded*\nTag: \`${{ needs.build-push.outputs.image_tag }}\`\n<$RUN_URL|View run>"
          else
            EMOJI=":x:"
            TEXT="<!channel> *PRODUCTION DEPLOY FAILED*\nStatus: $STATUS\n<$RUN_URL|View run>"
          fi

          curl -sf -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"$EMOJI $TEXT\", \"username\": \"DataPulse Deploy\", \"icon_emoji\": \"$EMOJI\"}" \
            || echo "Slack notification failed (non-blocking)"
