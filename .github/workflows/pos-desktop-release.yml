name: POS Desktop Release

# Builds the DataPulse POS Electron app into a Windows NSIS installer and
# (when triggered by a tag) publishes it to a GitHub Release via
# electron-builder's built-in GitHub provider.
#
# Local Windows dev machines CANNOT produce the NSIS installer reliably
# because electron-builder's winCodeSign cache contains darwin symlinks
# that non-admin Windows users cannot extract. The hosted runner does not
# hit this restriction. This workflow is the canonical path to installer
# artifacts.

on:
  # Full release: push a tag like pos-desktop-v1.0.0
  push:
    tags:
      - "pos-desktop-v*.*.*"

  # Smoke-build: PR touches POS desktop code or frontend. Produces artifact
  # but does NOT publish. Lets us catch build regressions before tagging a release.
  pull_request:
    paths:
      - "pos-desktop/**"
      - ".github/workflows/pos-desktop-release.yml"

  # Manual trigger for ad-hoc builds (e.g. testing installer locally).
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to GitHub Releases (requires tag-like behavior)?"
        type: boolean
        default: false

concurrency:
  group: pos-desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build NSIS installer
    runs-on: windows-latest
    timeout-minutes: 30

    permissions:
      contents: write # needed for publishing release assets on tag push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Two separate lockfiles — use the frontend one as the cache key
          # and re-resolve the pos-desktop one manually below.
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Fail loudly when the git tag and pos-desktop/package.json disagree.
      # Tonight (#802) a tag was pushed without bumping package.json; every
      # downstream artifact silently skipped publish. The error message
      # below is the recovery runbook so the operator who hits this knows
      # exactly what to do without grepping for docs.
      - name: Assert tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/pos-desktop-v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/pos-desktop-v}"
          PKG_VERSION=$(node -p "require('./pos-desktop/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            cat <<EOF
          ::error::Tag version mismatch
            Tag:           pos-desktop-v$TAG_VERSION
            package.json:  $PKG_VERSION

          Recovery:
            1. Bump pos-desktop/package.json + package-lock.json to $TAG_VERSION
            2. Commit + push to main
            3. Delete bad tag: git push origin :refs/tags/pos-desktop-v$TAG_VERSION
            4. Re-tag from new HEAD: git tag pos-desktop-v$TAG_VERSION && git push origin pos-desktop-v$TAG_VERSION
          EOF
            exit 1
          fi
          echo "::notice::Tag and package.json both at $TAG_VERSION"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Install pos-desktop dependencies
        working-directory: pos-desktop
        run: npm ci --no-audit --no-fund

      # Native module rebuild (better-sqlite3) against Electron's Node ABI.
      # electron-builder runs this automatically during package, but doing
      # it explicitly up front gives a clearer failure signal if the toolchain
      # is missing on the runner.
      - name: Rebuild native modules for Electron
        working-directory: pos-desktop
        run: npx electron-builder install-app-deps

      # Phase 2 of pipeline standardization (spec §4.1): on tag pushes, fail
      # loudly if the tag suffix and pos-desktop/package.json don't agree.
      # PR #802 was the silent-fail incident — the workflow ran, electron-builder
      # used the package.json version (1.0.1), and the GitHub Release for tag
      # pos-desktop-v2.0.0 ended up empty because no v2.0.0 build was produced.
      # The recovery runbook is embedded in the error so an operator hitting
      # this can fix it without context-switching to docs.
      - name: Assert tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/pos-desktop-v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/pos-desktop-v}"
          PKG_VERSION=$(node -p "require('./pos-desktop/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            cat <<EOF
          ::error::Tag version mismatch
            Tag:           pos-desktop-v$TAG_VERSION
            package.json:  $PKG_VERSION

          Recovery:
            1. Bump pos-desktop/package.json + package-lock.json to $TAG_VERSION
            2. Commit + push to main
            3. Delete bad tag:    git push origin :refs/tags/pos-desktop-v$TAG_VERSION
            4. Re-tag from new HEAD:
                 git tag pos-desktop-v$TAG_VERSION && git push origin pos-desktop-v$TAG_VERSION
          EOF
            exit 1
          fi
          echo "::notice::Tag and package.json both at $TAG_VERSION"

      # Detect whether Windows code-signing secrets are available (#476).
      # CSC_LINK (base64-encoded .pfx) + CSC_KEY_PASSWORD are standard
      # electron-builder env vars — when both are set the build produces
      # a signed installer and SmartScreen reputation can start accruing.
      # When missing (e.g. forked PRs, local dev) we fall through to an
      # unsigned build with a loud notice so the state is auditable.
      - name: Detect code-signing config
        id: signing_detect
        shell: bash
        run: |
          MISSING=""
          [[ -z "${{ secrets.CSC_LINK }}" ]]         && MISSING="$MISSING CSC_LINK"
          [[ -z "${{ secrets.CSC_KEY_PASSWORD }}" ]] && MISSING="$MISSING CSC_KEY_PASSWORD"
          if [[ -z "$MISSING" ]]; then
            echo "enabled=1" >> "$GITHUB_OUTPUT"
            echo "::notice::Code-signing cert detected — installer will be signed."
          else
            echo "enabled=0" >> "$GITHUB_OUTPUT"
            echo "::notice::Code-signing cert NOT configured — producing UNSIGNED installer. Missing secrets:${MISSING}. Add them to the repo (Settings → Secrets) to enable signing. Tracked under #476."
          fi

      # Run the canonical build script. Uses Git Bash (pre-installed on
      # windows-latest). Produces:
      #   pos-desktop/resources/nextjs/*  (standalone Next.js server)
      #   pos-desktop/dist/*-Setup.exe    (NSIS installer)
      - name: Build installer
        shell: bash
        working-directory: pos-desktop
        env:
          # electron-builder picks this up to publish to GH Releases when
          # triggered by a tag push. For PRs / workflow_dispatch (without
          # publish=true) we explicitly set PUBLISH=never below.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows code-signing (#476). Empty when secrets are missing —
          # electron-builder skips signing silently in that case.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Clerk build-time env. Next.js inlines NEXT_PUBLIC_* at build,
          # so these MUST be set before `next build` runs in build.sh.
          # Missing keys produce a working installer that fails at runtime
          # when Clerk initialises (acceptable for draft / fork PRs).
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_JWT_TEMPLATE: ${{ secrets.NEXT_PUBLIC_CLERK_JWT_TEMPLATE }}
          # Opt-in: upload the .pfx to a hardware token / EV signer in a
          # future iteration. The variable is forwarded so `signtool` can
          # pick it up when #476 upgrades to an EV cert.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/pos-desktop-v* ]]; then
            echo "Tag build — electron-builder will publish to GitHub Releases."
            export PUBLISH_FLAG="--publish=always"
          elif [[ "${{ github.event.inputs.publish }}" == "true" ]]; then
            echo "Manual publish requested."
            export PUBLISH_FLAG="--publish=always"
          else
            echo "PR or manual build — installer produced but not published."
            export PUBLISH_FLAG="--publish=never"
          fi

          # Run the standard build (compiles Next.js + Electron TS + assets)
          # then invoke electron-builder with the appropriate publish flag.
          bash scripts/build.sh --dev
          npx electron-builder --win $PUBLISH_FLAG

      - name: Verify installer exists
        shell: bash
        working-directory: pos-desktop
        run: |
          ls -lah dist/*.exe
          # Confirm at least one NSIS installer was produced
          count=$(ls dist/*-Setup.exe 2>/dev/null | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "::error::No NSIS installer produced in dist/"
            exit 1
          fi

      # When signing is enabled, confirm the produced binary actually carries
      # a valid signature — guards against silent signing failures (wrong
      # cert password, expired cert, etc) that electron-builder logs as a
      # warning but does not fail the build on (#476).
      - name: Verify installer signature
        if: ${{ steps.signing_detect.outputs.enabled == '1' }}
        shell: pwsh
        working-directory: pos-desktop
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*-Setup.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No installer found"; exit 1 }
          $sig = Get-AuthenticodeSignature $exe.FullName
          Write-Host "Status:  $($sig.Status)"
          Write-Host "Signer:  $($sig.SignerCertificate.Subject)"
          Write-Host "Issuer:  $($sig.SignerCertificate.Issuer)"
          if ($sig.Status -ne 'Valid') {
            Write-Error "Installer signature is '$($sig.Status)' — signing secrets wired but produced an invalid signature. See #476."
            exit 1
          }

      # ── Auto-register the rollout in the staged-update table ──────────
      # Replaces the per-release SQL migration pattern (#802 used migration
      # 123). Calls POST /api/v1/pos/admin/desktop-releases — gated by
      # pos:update:manage permission and idempotent on (version, channel,
      # platform), so re-running on the same tag is safe.
      #
      # When POS_ADMIN_TOKEN is unset (e.g. before the operator provisions
      # the secret) the step degrades to a no-op with a notice so existing
      # tag pushes continue to publish artifacts. Once provisioned, every
      # subsequent release auto-registers.
      - name: Register rollout in DB
        if: success() && startsWith(github.ref, 'refs/tags/pos-desktop-v')
        env:
          POS_ADMIN_TOKEN: ${{ secrets.POS_ADMIN_TOKEN }}
        shell: bash
        run: |
          if [ -z "${POS_ADMIN_TOKEN:-}" ]; then
            echo "::warning::POS_ADMIN_TOKEN secret not set — skipping rollout registration. Add a service-account Bearer with the pos:update:manage permission under repo Settings → Secrets to enable auto-register."
            exit 0
          fi
          VERSION="${GITHUB_REF#refs/tags/pos-desktop-v}"
          BODY=$(jq -nc \
            --arg v "$VERSION" \
            '{version:$v,channel:"stable",platform:"win32",rollout_scope:"all",active:true,release_notes:("Auto-registered by pos-desktop-release workflow for tag pos-desktop-v" + $v)}')
          echo "Registering: $BODY"
          curl -fsSL --retry 3 --retry-delay 5 \
            -X POST https://smartdatapulse.tech/api/v1/pos/admin/desktop-releases \
            -H "Authorization: Bearer $POS_ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -o /tmp/register-response.json \
            -w "Registered: HTTP %{http_code}\n"
          cat /tmp/register-response.json

      # ── Sentry source-map upload (follow-up to #481 / PR #495) ────────
      # Runs only on tag pushes AND only when SENTRY_AUTH_TOKEN is set.
      # Without this step, crashes reach Sentry but stacks are NOT
      # symbolicated. The release name MUST match `app.getVersion()` at
      # runtime (which reads package.json `version`), so we derive it
      # from that file rather than the tag to keep the two in lockstep.
      - name: Detect Sentry release config
        id: sentry_detect
        shell: bash
        run: |
          # All three secrets are required by getsentry/action-release — if
          # any is missing, skip the step entirely rather than fail mid-run.
          MISSING=""
          [[ -z "${{ secrets.SENTRY_AUTH_TOKEN }}" ]] && MISSING="$MISSING SENTRY_AUTH_TOKEN"
          [[ -z "${{ secrets.SENTRY_ORG }}" ]]        && MISSING="$MISSING SENTRY_ORG"
          [[ -z "${{ secrets.SENTRY_PROJECT }}" ]]    && MISSING="$MISSING SENTRY_PROJECT"
          if [[ -z "$MISSING" ]]; then
            echo "enabled=1" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=0" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Sentry source-map upload — missing repo secrets:${MISSING}. Crashes still reach Sentry but stacks will not be symbolicated."
          fi
          VERSION=$(node -p "require('./pos-desktop/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload source maps to Sentry
        if: ${{ startsWith(github.ref, 'refs/tags/pos-desktop-v') && steps.sentry_detect.outputs.enabled == '1' }}
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          version: ${{ steps.sentry_detect.outputs.version }}
          # The Electron main bundle lives at `pos-desktop/dist/electron/*.js`
          # with sibling `.map` files (tsc emits both when sourceMap=true).
          sourcemaps: pos-desktop/dist
          # `~/dist` = suffix-match: Sentry matches any stack frame whose
          # URL ends in `/dist/...`. Works for both `file:///...app.asar/dist/...`
          # and `app:///dist/...` origins that different Electron versions
          # emit. If symbolication is still partial post-release, fine-tune
          # with a narrower `url_prefix` matching the runtime stack URLs.
          url_prefix: "~/dist"
          finalize: true
          set_commits: skip

      # Keep the artifact around for manual download even on non-release
      # runs. Retention is limited to save storage; tag builds also get
      # the file attached to the Release.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: datapulse-pos-installer-${{ github.run_number }}
          path: pos-desktop/dist/*-Setup.exe
          retention-days: 14
          if-no-files-found: error

      - name: Print installer info
        shell: bash
        working-directory: pos-desktop
        run: |
          echo "=== Installer(s) produced ==="
          ls -lah dist/*.exe
          echo ""
          echo "=== Download ==="
          if [[ "${{ github.ref }}" == refs/tags/pos-desktop-v* ]]; then
            echo "Attached to the release for tag ${{ github.ref_name }}."
          else
            echo "Available as artifact 'datapulse-pos-installer-${{ github.run_number }}' for 14 days."
          fi
