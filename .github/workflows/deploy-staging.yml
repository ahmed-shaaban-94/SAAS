name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/saas

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            context: .
            target: api
          - service: frontend
            context: ./frontend
            target: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,nginx/,migrations/,postgres/"
          target: ${{ secrets.STAGING_DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            export IMAGE_TAG=staging
            export API_KEY="${{ secrets.API_KEY }}"
            export PIPELINE_WEBHOOK_SECRET="${{ secrets.PIPELINE_WEBHOOK_SECRET }}"
            export NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}"

            # Save current image digests for rollback
            echo "=== Saving current state for rollback ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              ps --format json > /tmp/staging-pre-deploy.json 2>/dev/null || true

            PREV_API_IMAGE=$(docker inspect --format='{{.Image}}' datapulse-api 2>/dev/null || echo "none")
            PREV_FRONTEND_IMAGE=$(docker inspect --format='{{.Image}}' datapulse-frontend 2>/dev/null || echo "none")
            echo "Previous API: $PREV_API_IMAGE"
            echo "Previous Frontend: $PREV_FRONTEND_IMAGE"

            # Pull latest images
            echo "=== Pulling new images ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull

            # Deploy
            echo "=== Starting deployment ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --remove-orphans

            # Health check — API
            echo "=== Health check: API ==="
            API_OK=false
            for i in $(seq 1 12); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:8000/health 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "API health check PASSED on attempt $i"
                API_OK=true
                break
              fi
              echo "Attempt $i: API HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done

            # Health check — Frontend
            echo "=== Health check: Frontend ==="
            FE_OK=false
            for i in $(seq 1 6); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:3000 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Frontend health check PASSED on attempt $i"
                FE_OK=true
                break
              fi
              echo "Attempt $i: Frontend HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done

            # Smoke tests — verify critical API endpoints return valid responses
            echo "=== Smoke tests ==="
            SMOKE_OK=true

            # Test /health/ready
            READY=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health/ready 2>/dev/null || echo "000")
            if [ "$READY" != "200" ]; then
              echo "FAIL: /health/ready returned $READY"
              SMOKE_OK=false
            else
              echo "PASS: /health/ready"
            fi

            # Test /api/v1/analytics/summary (with API key if set)
            SUMMARY=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "X-API-Key: ${API_KEY:-}" \
              http://localhost:8000/api/v1/analytics/summary 2>/dev/null || echo "000")
            if [ "$SUMMARY" != "200" ] && [ "$SUMMARY" != "401" ]; then
              echo "FAIL: /api/v1/analytics/summary returned $SUMMARY (expected 200 or 401)"
              SMOKE_OK=false
            else
              echo "PASS: /api/v1/analytics/summary ($SUMMARY)"
            fi

            # Test /api/v1/reports
            REPORTS=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "X-API-Key: ${API_KEY:-}" \
              http://localhost:8000/api/v1/reports 2>/dev/null || echo "000")
            if [ "$REPORTS" != "200" ] && [ "$REPORTS" != "401" ]; then
              echo "FAIL: /api/v1/reports returned $REPORTS"
              SMOKE_OK=false
            else
              echo "PASS: /api/v1/reports ($REPORTS)"
            fi

            echo "=== Container Status ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              ps

            # Rollback if any check failed
            if [ "$API_OK" != "true" ] || [ "$FE_OK" != "true" ] || [ "$SMOKE_OK" != "true" ]; then
              echo "::error::Staging deploy FAILED — initiating rollback"
              echo "API: $API_OK | Frontend: $FE_OK | Smoke: $SMOKE_OK"

              # Show container logs for debugging
              echo "=== API Logs (last 50 lines) ==="
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                logs --tail=50 api 2>&1 || true

              echo "=== Frontend Logs (last 30 lines) ==="
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                logs --tail=30 frontend 2>&1 || true

              # Rollback: restart with previous images if available
              if [ "$PREV_API_IMAGE" != "none" ]; then
                echo "=== Rolling back to previous images ==="
                docker compose \
                  -f docker-compose.yml \
                  -f docker-compose.prod.yml \
                  down --remove-orphans
                docker compose \
                  -f docker-compose.yml \
                  -f docker-compose.prod.yml \
                  up -d
                echo "Rollback completed — verify manually"
              fi
              exit 1
            fi

            echo "=== Staging deploy SUCCESSFUL ==="

            # Rebuild dbt models with 5min timeout
            echo "=== Running dbt ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              exec -T api timeout 300 sh -c "\
                cd /app/dbt && \
                dbt deps --profiles-dir . && \
                dbt run --profiles-dir . \
              " || echo "::warning::dbt run failed — data models may be stale"
