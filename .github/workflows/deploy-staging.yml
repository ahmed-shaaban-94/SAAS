name: Deploy Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/saas

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            context: .
            target: api
          - service: app
            context: .
            target: app
          - service: frontend
            context: ./frontend
            target: production
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          fingerprint: ${{ secrets.STAGING_HOST_FINGERPRINT }}
          source: "docker-compose.yml,docker-compose.prod.yml,traefik/,nginx/"
          target: ${{ secrets.STAGING_DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          fingerprint: ${{ secrets.STAGING_HOST_FINGERPRINT }}
          script: |
            cd ${{ secrets.STAGING_DEPLOY_PATH }}

            # Pull latest images (no git pull — compose files copied via SCP)
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --remove-orphans

            # Wait for services to be healthy
            sleep 15
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              ps --format json | head -20

            # Rebuild dbt models (stg -> fct -> agg -> metrics)
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              exec -T api sh -c "\
                cd /app/dbt && \
                dbt deps --profiles-dir . && \
                dbt run --profiles-dir . \
              "
