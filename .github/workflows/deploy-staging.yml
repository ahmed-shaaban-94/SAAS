name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/saas

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            context: .
            target: api
          - service: frontend
            context: ./frontend
            target: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,nginx/,migrations/,postgres/"
          target: ${{ secrets.STAGING_DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ${{ secrets.STAGING_DEPLOY_PATH }}

            # Pull latest images (no git pull — compose files copied via SCP)
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --remove-orphans

            # Health check with retries
            echo "=== Waiting for services ==="
            for i in $(seq 1 6); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:3000 || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Health check PASSED on attempt $i (HTTP $HTTP_CODE)"
                break
              fi
              echo "Attempt $i: HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done

            echo "=== Container Status ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              ps

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::error::Staging health check failed after 6 attempts (HTTP $HTTP_CODE)"
              exit 1
            fi

            # Rebuild dbt models (stg -> fct -> agg -> metrics) with 5min timeout
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              exec -T api timeout 300 sh -c "\
                cd /app/dbt && \
                dbt deps --profiles-dir . && \
                dbt run --profiles-dir . \
              "
