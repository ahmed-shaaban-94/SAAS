name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/data-pulse

jobs:
  # ── Step 1: Build & push Docker images ───────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            context: .
            target: api
          - service: frontend
            context: ./frontend
            target: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_ENVIRONMENT=staging
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_AUTH_PROVIDER=clerk

  # ── Step 2: Deploy to staging server ─────────────────────────────────
  deploy:
    name: Deploy to Staging
    needs: [build-push]
    runs-on: ubuntu-latest
    environment: deploy
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Deployment summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"

          {
            echo "## Staging Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Branch** | \`main\` |"
            echo "| **Commit** | \`$SHORT_SHA\` |"
            echo "| **Author** | $(git log -1 --format='%an' "$SHA" 2>/dev/null || echo 'N/A') |"
            echo "| **Message** | $(git log -1 --format='%s' "$SHA" 2>/dev/null || echo 'N/A') |"
            echo "| **CI Run** | [#${{ github.event.workflow_run.run_number }}](${{ github.event.workflow_run.html_url }}) |"
            echo "| **Deployed at** | $(date -u +'%Y-%m-%d %H:%M UTC') |"
            echo ""
            echo "### Recent Commits"
            echo '```'
            git log --oneline -10 "$SHA" 2>/dev/null || echo "Could not fetch log"
            echo '```'
            echo ""
            echo "### Changed Files (last 5 commits)"
            echo '```'
            git diff --stat "$SHA~5..$SHA" 2>/dev/null || echo "Could not compute diff"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,docker-compose.monitoring.yml,nginx/,migrations/,postgres/,monitoring/"
          target: ${{ secrets.STAGING_DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          API_KEY: ${{ secrets.API_KEY }}
          PIPELINE_WEBHOOK_SECRET: ${{ secrets.PIPELINE_WEBHOOK_SECRET }}
          PHARMACIST_SIGNING_SECRET: ${{ secrets.PHARMACIST_SIGNING_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DB_READER_PASSWORD: ${{ secrets.DB_READER_PASSWORD }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: API_KEY,PIPELINE_WEBHOOK_SECRET,PHARMACIST_SIGNING_SECRET,NEXTAUTH_SECRET,POSTGRES_PASSWORD,REDIS_PASSWORD,DB_READER_PASSWORD
          script: |
            set -e
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            export IMAGE_TAG=staging
            # Secrets are available as env vars (passed via envs: — not in shell history)
            export API_KEY PIPELINE_WEBHOOK_SECRET PHARMACIST_SIGNING_SECRET NEXTAUTH_SECRET POSTGRES_PASSWORD REDIS_PASSWORD DB_READER_PASSWORD

            # Nginx needs an origin cert for Cloudflare Full mode. The repo
            # does not store private keys, so generate a local self-signed
            # cert if the server does not already have one.
            mkdir -p traefik/certs nginx
            if [ ! -s traefik/certs/origin.crt ] || [ ! -s traefik/certs/origin.key ]; then
              echo "=== Generating missing nginx origin certificate ==="
              openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout traefik/certs/origin.key \
                -out traefik/certs/origin.crt \
                -subj "/CN=smartdatapulse.tech" \
                -addext "subjectAltName=DNS:smartdatapulse.tech,DNS:*.smartdatapulse.tech"
              chmod 600 traefik/certs/origin.key
            fi
            touch nginx/monitoring.htpasswd

            # Save current image digests for rollback
            echo "=== Saving current state for rollback ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.monitoring.yml \
              ps --format json > /tmp/staging-pre-deploy.json 2>/dev/null || true

            PREV_API_IMAGE=$(docker inspect --format='{{.Image}}' datapulse-api 2>/dev/null || echo "none")
            PREV_FRONTEND_IMAGE=$(docker inspect --format='{{.Image}}' datapulse-frontend 2>/dev/null || echo "none")
            echo "Previous API: $PREV_API_IMAGE"
            echo "Previous Frontend: $PREV_FRONTEND_IMAGE"

            # Pull latest images (retry up to 3 times — GHCR can drop IPv6 connections)
            echo "=== Pulling new images ==="
            PULL_OK=false
            for attempt in 1 2 3; do
              if docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                -f docker-compose.monitoring.yml \
                pull; then
                PULL_OK=true
                break
              fi
              echo "::warning::docker compose pull failed (attempt $attempt/3) — retrying in 15s..."
              sleep 15
            done
            if [ "$PULL_OK" != "true" ]; then
              echo "::error::docker compose pull failed after 3 attempts"
              exit 1
            fi

            # Self-heal: a previous failed deploy may have left containers
            # in `Created` / `Exited` state (recreate started but never
            # finished). Compose then fails with "container name already
            # in use" on the next --force-recreate. Force-remove any
            # datapulse-* container that is NOT currently running, before
            # we re-up. Running containers are untouched — compose's
            # --force-recreate handles them.
            echo "=== Self-heal: removing stuck non-running containers ==="
            STUCK=$(docker ps -a \
              --filter 'name=datapulse-' \
              --filter 'status=created' \
              --format '{{.Names}}')
            STUCK_EXITED=$(docker ps -a \
              --filter 'name=datapulse-' \
              --filter 'status=exited' \
              --format '{{.Names}}')
            STUCK_DEAD=$(docker ps -a \
              --filter 'name=datapulse-' \
              --filter 'status=dead' \
              --format '{{.Names}}')
            ALL_STUCK=$(echo "$STUCK $STUCK_EXITED $STUCK_DEAD" | tr ' ' '\n' | grep -v '^$' | sort -u)
            if [ -n "$ALL_STUCK" ]; then
              echo "Removing: $(echo "$ALL_STUCK" | tr '\n' ' ')"
              echo "$ALL_STUCK" | xargs -r docker rm -f 2>&1 | tail -10 || true
            else
              echo "No stuck containers — nothing to clean"
            fi

            # Deploy in two phases:
            # 1. Bring up infra (postgres, redis) normally — no recreate needed
            # 2. Force-recreate app services (api, frontend, nginx) so nginx
            #    picks up new upstream container IPs and the config is reloaded.
            #    --force-recreate on postgres/redis would cause a cold DB restart
            #    making /health return 503 for minutes.
            echo "=== Starting deployment ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.monitoring.yml \
              up -d --remove-orphans postgres redis || echo "::warning::infra up exited non-zero"
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.monitoring.yml \
              up -d --remove-orphans --force-recreate api frontend nginx || echo "::warning::app up exited non-zero — checking health..."

            # Immediate diagnostics — surface the real error before waiting
            echo "=== Container status after up ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml ps || true
            echo "=== API logs (startup) ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml logs --tail=80 api 2>&1 || true
            echo "=== Nginx logs (startup) ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml logs --tail=80 nginx 2>&1 || true

            # Health check — API liveness via nginx internal port.
            # Uses /health/live (always 200 if process is alive) not /health
            # (returns 503 until DB is ready). Readiness is tested in smoke tests.
            echo "=== Health check: API ==="
            API_OK=false
            for i in $(seq 1 24); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://localhost:8080/health/live 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "API health check PASSED on attempt $i"
                API_OK=true
                break
              fi
              echo "Attempt $i: API HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done

            # Health check — Frontend via HTTPS (tests full nginx → frontend path)
            echo "=== Health check: Frontend ==="
            FE_OK=false
            for i in $(seq 1 12); do
              HTTP_CODE=$(curl -skL -o /dev/null -w '%{http_code}' --connect-timeout 5 -H "Host: smartdatapulse.tech" https://localhost 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Frontend health check PASSED on attempt $i"
                FE_OK=true
                break
              fi
              echo "Attempt $i: Frontend HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done

            # Build dbt models BEFORE smoke tests (they query dbt tables like metrics_summary)
            echo "=== Running dbt ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.monitoring.yml \
              exec -T api timeout 300 sh -c "\
                cd /app/dbt && \
                dbt deps --profiles-dir . && \
                dbt run --profiles-dir . \
              " || echo "::warning::dbt run failed — data models may be stale"

            # Smoke tests — verify critical API endpoints return valid responses
            echo "=== Smoke tests ==="
            SMOKE_OK=true

            # Test /health/ready (via nginx internal port — no SSL/Host needed)
            READY=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health/ready 2>/dev/null || echo "000")
            if [ "$READY" != "200" ]; then
              echo "FAIL: /health/ready returned $READY"
              SMOKE_OK=false
            else
              echo "PASS: /health/ready"
            fi

            # Test /api/v1/analytics/summary (via HTTPS with Host header)
            # Non-blocking: depends on dbt tables + loaded data, may fail on fresh DB
            SUMMARY=$(curl -skL -o /dev/null -w '%{http_code}' \
              -H "Host: smartdatapulse.tech" \
              -H "X-API-Key: ${API_KEY:-}" \
              https://localhost/api/v1/analytics/summary 2>/dev/null || echo "000")
            if [ "$SUMMARY" != "200" ] && [ "$SUMMARY" != "401" ]; then
              echo "WARN: /api/v1/analytics/summary returned $SUMMARY (expected 200 or 401, non-blocking)"
            else
              echo "PASS: /api/v1/analytics/summary ($SUMMARY)"
            fi

            # Test /api/v1/reports (via HTTPS with Host header)
            # Non-blocking: depends on dbt tables + loaded data
            REPORTS=$(curl -skL -o /dev/null -w '%{http_code}' \
              -H "Host: smartdatapulse.tech" \
              -H "X-API-Key: ${API_KEY:-}" \
              https://localhost/api/v1/reports 2>/dev/null || echo "000")
            if [ "$REPORTS" != "200" ] && [ "$REPORTS" != "401" ]; then
              echo "WARN: /api/v1/reports returned $REPORTS (non-blocking)"
            else
              echo "PASS: /api/v1/reports ($REPORTS)"
            fi

            echo "=== Container Status ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.monitoring.yml \
              ps

            # Rollback if core checks failed (API health + Frontend + readiness)
            # Analytics smoke tests are non-blocking (depend on loaded data)
            if [ "$API_OK" != "true" ] || [ "$FE_OK" != "true" ] || [ "$SMOKE_OK" != "true" ]; then
              echo "::error::Staging deploy FAILED — initiating rollback"
              echo "API: $API_OK | Frontend: $FE_OK | Smoke: $SMOKE_OK"

              # Show container logs for debugging
              echo "=== API Logs (last 50 lines) ==="
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                logs --tail=50 api 2>&1 || true

              echo "=== Frontend Logs (last 30 lines) ==="
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                logs --tail=30 frontend 2>&1 || true

              echo "=== Nginx Logs (last 80 lines) ==="
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                -f docker-compose.monitoring.yml \
                logs --tail=80 nginx 2>&1 || true

              # Rollback: restart with previous images if available
              if [ "$PREV_API_IMAGE" != "none" ]; then
                echo "=== Rolling back to previous images ==="
                docker compose \
                  -f docker-compose.yml \
                  -f docker-compose.prod.yml \
                  down --remove-orphans
                docker compose \
                  -f docker-compose.yml \
                  -f docker-compose.prod.yml \
                  up -d
                echo "Rollback completed — verify manually"
              fi
              exit 1
            fi

            echo "=== Staging deploy SUCCESSFUL ==="

      - name: Post-deploy status
        if: always()
        uses: appleboy/ssh-action@v1
        env:
          API_KEY: ${{ secrets.API_KEY }}
          PIPELINE_WEBHOOK_SECRET: ${{ secrets.PIPELINE_WEBHOOK_SECRET }}
          PHARMACIST_SIGNING_SECRET: ${{ secrets.PHARMACIST_SIGNING_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DB_READER_PASSWORD: ${{ secrets.DB_READER_PASSWORD }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: API_KEY,PIPELINE_WEBHOOK_SECRET,PHARMACIST_SIGNING_SECRET,NEXTAUTH_SECRET,POSTGRES_PASSWORD,REDIS_PASSWORD,DB_READER_PASSWORD
          script: |
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            export IMAGE_TAG=staging
            export API_KEY PIPELINE_WEBHOOK_SECRET PHARMACIST_SIGNING_SECRET NEXTAUTH_SECRET POSTGRES_PASSWORD REDIS_PASSWORD DB_READER_PASSWORD

            echo "=== Final Container Status ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              -f docker-compose.monitoring.yml \
              ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== Recent Logs (last 15 lines per service) ==="
            for svc in api frontend nginx postgres; do
              echo "--- $svc ---"
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                -f docker-compose.monitoring.yml \
                logs --tail=15 "$svc" 2>&1 || true
              echo ""
            done

  # ── Step 3: Notify deploy result via Slack ────────────────────────────
  notify:
    name: Notify Deploy Result
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_DEPLOY_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi

          STATUS="${{ needs.deploy.result }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            TEXT="*Staging deploy succeeded*\nCommit: \`$SHORT_SHA\`\n<$RUN_URL|View run>"
          else
            EMOJI=":x:"
            TEXT="<!channel> *STAGING DEPLOY FAILED*\nCommit: \`$SHORT_SHA\`\nStatus: $STATUS\n<$RUN_URL|View run>"
          fi

          curl -sf -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"$EMOJI $TEXT\", \"username\": \"DataPulse Deploy\", \"icon_emoji\": \"$EMOJI\"}" \
            || echo "Slack notification failed (non-blocking)"
