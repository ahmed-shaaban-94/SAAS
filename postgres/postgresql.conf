# ─── DataPulse PostgreSQL Tuning (for 2GB container) ───
# Based on PGTune recommendations for 2GB RAM, SSD, web application

# Networking — required for Docker container communication
listen_addresses = '*'

# Memory
shared_buffers = 512MB
effective_cache_size = 1536MB
work_mem = 8MB
maintenance_work_mem = 128MB

# WAL / Checkpoints
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 256MB

# Query Planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Connections
max_connections = 100

# Logging (minimal overhead)
log_min_duration_statement = 1000
log_checkpoints = on
log_lock_waits = on

# Parallelism
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2
