server {
    listen 80;
    listen 443 ssl;
    server_name smartdatapulse.tech;

    ssl_certificate /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    resolver 127.0.0.11 valid=10s;

    # NextAuth routes -> Next.js
    location /api/auth/ {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # API v1 routes -> FastAPI directly (web + mobile both send Bearer tokens)
    location /api/v1/ {
        set $api http://api:8000;
        proxy_pass $api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Direct API routes (health, docs) -> FastAPI
    location /health {
        set $api http://api:8000;
        proxy_pass $api;
        proxy_set_header Host $host;
    }

    location /docs {
        set $api http://api:8000;
        proxy_pass $api;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        set $api http://api:8000;
        proxy_pass $api;
        proxy_set_header Host $host;
    }

    # Frontend (everything else)
    location / {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
