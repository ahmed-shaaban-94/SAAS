# ─── Performance-tuned Nginx config for DataPulse ───

# Gzip compression — reduces transfer size by 60-80%
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

# Upstream definitions for keep-alive connection pooling
upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
}

upstream api_upstream {
    server api:8000;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general_zone:10m rate=60r/s;

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name smartdatapulse.tech;

    ssl_certificate /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    # SSL session caching — avoids repeated handshakes
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    resolver 127.0.0.11 valid=30s;

    # Connection tuning
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 100M;

    # Buffer tuning — reduce disk I/O
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; frame-ancestors 'none';" always;

    # Proxy timeouts — prevent cascading failures on long operations
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 300s;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_http_version 1.1;

    # ─── Static assets from Next.js (immutable, cache aggressively) ───
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Next.js public assets (favicon, images) ───
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_upstream;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ─── NextAuth routes -> Next.js ───
    location /api/auth/ {
        proxy_pass http://frontend_upstream;
        limit_req zone=api_zone burst=10 nodelay;
    }

    # ─── API v1 routes -> FastAPI directly ───
    location /api/v1/ {
        proxy_pass http://api_upstream;
        limit_req zone=api_zone burst=20 nodelay;

        # API responses: short browser cache, let SWR handle revalidation
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ─── Direct API routes (health, docs) -> FastAPI ───
    location /health {
        proxy_pass http://api_upstream;
        access_log off;
    }

    location /docs {
        proxy_pass http://api_upstream;
    }

    location /openapi.json {
        proxy_pass http://api_upstream;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ─── Frontend (everything else) ───
    location / {
        proxy_pass http://frontend_upstream;
        limit_req zone=general_zone burst=30 nodelay;
    }
}
