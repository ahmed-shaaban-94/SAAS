# ─── Performance-tuned Nginx config for DataPulse ───

# WebSocket upgrade map — used by Grafana live dashboard connections
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Structured JSON access log — parseable by ELK / Loki / Datadog out of the box.
# escape=json ensures special characters in user_agent / URI are safely escaped.
log_format json_combined escape=json
    '{'
        '"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"remote_addr":"$remote_addr",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"x_request_id":"$http_x_request_id",'
        '"user_agent":"$http_user_agent",'
        '"referrer":"$http_referer",'
        '"host":"$host"'
    '}';

# Gzip compression — reduces transfer size by 60-80%
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

# Upstream definitions for keep-alive connection pooling
upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
}

upstream api_upstream {
    server api:8000;
    keepalive 16;
}

# Retry on transient upstream failures — prevents raw 502s during restarts
proxy_next_upstream error timeout http_502 http_503;
proxy_next_upstream_timeout 5s;
proxy_next_upstream_tries 2;

# Rate limiting zones — aligned with FastAPI slowapi (60/minute ≈ 1r/s)
# rate=2r/s with burst=10 allows short bursts (dashboard loading multiple endpoints)
# while capping sustained load close to FastAPI's 60/min for defense-in-depth.
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_zone:10m rate=10r/s;
# Dedicated zone for the POS subdomain — same rate but isolated bucket so
# barcode-scan-speed cart mutations can't exhaust the dashboard's api_zone.
limit_req_zone $binary_remote_addr zone=pos_api_zone:10m rate=10r/s;

# ─── Internal health check (port 8080, any Host) ───
# Used by Docker healthcheck and deploy scripts to verify nginx is alive
# without requiring a valid server_name or SSL.
server {
    listen 8080;
    server_name _;

    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /health {
        proxy_pass http://api_upstream;
        access_log off;
    }

    location / {
        return 444;
    }
}

# ─── HTTP → HTTPS redirect ───
server {
    listen 80;
    server_name smartdatapulse.tech;

    return 301 https://$host$request_uri;
}

# ─── HTTPS server ───
server {
    listen 443 ssl;
    http2 on;
    server_name smartdatapulse.tech;

    ssl_certificate /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    # TLS protocol restrictions — disable TLS 1.0 and 1.1
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # SSL session caching — avoids repeated handshakes
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    resolver 127.0.0.11 valid=30s;

    # Use structured JSON logs for this virtual host
    access_log /var/log/nginx/access.log json_combined;

    # Connection tuning
    keepalive_timeout 65;
    keepalive_requests 1000;
    # Aligned with MAX_FILE_SIZE_MB=500 in application config
    client_max_body_size 500M;

    # Buffer tuning — reduce disk I/O
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # Security headers — shared set lives in security-headers.inc so the POS
    # vhost and any future vhosts inherit them without copy-paste drift.
    include /etc/nginx/conf.d/security-headers.inc;
    # CSP is NOT set at server level — the frontend's Next.js middleware owns its own CSP,
    # and API-specific CSP is set inside the /api/v1/ location block below.

    # Proxy timeouts — prevent cascading failures on long operations
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 300s;

    # Intercept upstream errors and serve branded error pages
    proxy_intercept_errors on;
    error_page 502 /errors/502.html;
    error_page 503 /errors/503.html;
    error_page 504 /errors/504.html;

    location /errors/ {
        internal;
        root /usr/share/nginx/html;
    }

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_http_version 1.1;

    # ─── Static assets from Next.js (immutable, cache aggressively) ───
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Next.js public assets (favicon, images) ───
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_upstream;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ─── NextAuth routes -> Next.js ───
    location /api/auth/ {
        proxy_pass http://frontend_upstream;
        limit_req zone=api_zone burst=5 nodelay;
    }

    # ─── API v1 routes -> FastAPI directly ───
    location /api/v1/ {
        proxy_pass http://api_upstream;
        proxy_pass_request_headers on;
        limit_req zone=api_zone burst=10 nodelay;

        # API clients (POS desktop, dashboard SWR) need structured JSON error
        # bodies and CORS headers on 4xx/5xx so they can surface the real
        # reason (and so cross-origin callers like the POS desktop on
        # http://localhost:3847 are not blocked by a missing
        # Access-Control-Allow-Origin on an intercepted error page). The
        # server-level `proxy_intercept_errors on` makes nginx swap any
        # 502/503/504 from FastAPI with /errors/*.html — great for the
        # marketing/dashboard HTML surface, catastrophic for an API where
        # the client parses response.json() and reads CORS.
        #
        # Root-caused 2026-04-24: every Bearer-authenticated POS request
        # surfaced as "Failed to fetch" because FastAPI's 503
        # ({"detail":"Authentication service unavailable"} from
        # core/jwt.py `_fetch_jwks`) was being rewritten to the branded
        # maintenance HTML without CORS. Disable the intercept here so the
        # real JSON reaches the browser.
        proxy_intercept_errors off;

        # Strict CSP for API responses — no scripts, no frames
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;
        # API responses: short browser cache, let SWR handle revalidation
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ─── Prometheus metrics — internal only, blocked from public internet ───
    # Prometheus scrapes this directly inside the Docker network (port 8000).
    # Nginx blocks it externally so raw metrics are never exposed publicly.
    location /metrics {
        deny all;
        return 403;
    }

    # ─── Direct API routes (health, docs) -> FastAPI ───
    location /health {
        proxy_pass http://api_upstream;
        access_log off;
    }

    location /docs {
        proxy_pass http://api_upstream;
    }

    location /openapi.json {
        proxy_pass http://api_upstream;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ─── Grafana monitoring UI — Basic Auth protected ───
    # Accessible at https://smartdatapulse.tech/grafana/
    # Grafana is configured with GF_SERVER_SERVE_FROM_SUB_PATH=true so all
    # asset URLs and API calls use /grafana/ as their base path.
    location /grafana/ {
        auth_basic "DataPulse Monitoring";
        auth_basic_user_file /etc/nginx/monitoring.htpasswd;

        # Resolve Grafana lazily so nginx can still start when the optional
        # monitoring service is not running.
        set $grafana_upstream http://grafana:3000;
        proxy_pass $grafana_upstream;

        # WebSocket support — Grafana live dashboards use it
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Let Grafana handle its own error pages — don't intercept
        proxy_intercept_errors off;
    }

    # ─── Frontend (everything else) ───
    location / {
        proxy_pass http://frontend_upstream;
        limit_req zone=general_zone burst=20 nodelay;
    }
}

# ─── pos.smartdatapulse.tech — HTTP → HTTPS redirect ───
server {
    listen 80;
    server_name pos.smartdatapulse.tech;

    return 301 https://$host$request_uri;
}

# ─── pos.smartdatapulse.tech — POS API-only vhost ───
# Exposes ONLY /api/v1/ and /health — no frontend, no Grafana, no docs.
# Requests to anything else return 404, closing the entire dashboard/NextAuth
# surface from the POS network path.
server {
    listen 443 ssl;
    http2 on;
    server_name pos.smartdatapulse.tech;

    # Same wildcard origin cert — already covers *.smartdatapulse.tech
    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    resolver 127.0.0.11 valid=30s;

    # Isolated log — key reason for a dedicated vhost (grep pos_access.log for POS-only traffic)
    access_log /var/log/nginx/pos_access.log json_combined;

    # POS payloads are JSON cart mutations (<10 KB) — not file uploads
    client_max_body_size 1M;

    # Never swap FastAPI JSON error bodies for branded HTML pages.
    # Same root cause as 2026-04-24 incident on the main vhost (/api/v1/ block).
    proxy_intercept_errors off;

    keepalive_timeout 65;
    keepalive_requests 1000;

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 300s;

    include /etc/nginx/conf.d/security-headers.inc;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_http_version 1.1;

    # ─── POS API ───
    location /api/v1/ {
        proxy_pass http://api_upstream;
        proxy_pass_request_headers on;
        limit_req zone=pos_api_zone burst=20 nodelay;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ─── Health probe ───
    location /health {
        proxy_pass http://api_upstream;
        access_log off;
    }

    # ─── Static assets from Next.js (immutable, cache aggressively) ───
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Next.js public assets (favicon, images, fonts) ───
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_upstream;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ─── Clerk + NextAuth callback routes -> Next.js ───
    location /api/auth/ {
        proxy_pass http://frontend_upstream;
        limit_req zone=pos_api_zone burst=10 nodelay;
    }

    # ─── Frontend (POS UI) ───
    # Serves the same Next.js bundle as the main domain. The (pos) route
    # group + middleware enforce Clerk auth; non-POS routes still resolve
    # but require a signed-in session. Clerk's allowed-origins list must
    # include https://pos.smartdatapulse.tech for tokens to mint.
    location / {
        proxy_pass http://frontend_upstream;
        limit_req zone=pos_api_zone burst=10 nodelay;
    }
}
