<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="15">
<title>DataPulse - Request Timeout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{text-align:center;max-width:480px;padding:3rem 2rem}
h1{font-size:1.5rem;margin-bottom:1rem;color:#60a5fa}
p{font-size:1rem;line-height:1.6;margin-bottom:0.75rem;color:#94a3b8}
.code{font-size:3rem;font-weight:700;color:#1e40af;margin-bottom:1.5rem}
.retry{font-size:0.875rem;color:#64748b}
</style>
</head>
<body>
<div class="card">
  <div class="code">504</div>
  <h1>Request timed out</h1>
  <p>The server took too long to respond. Please try again in a moment.</p>
  <p class="retry">This page will automatically refresh in 15 seconds.</p>
</div>
</body>
</html>
