services:
  # ---------- Traefik Reverse Proxy ----------
  traefik:
    image: traefik:v3.1
    container_name: datapulse-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--api.insecure=false"
      - "--log.level=WARN"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - backend
      - frontend-net

  prestart:
    build:
      context: .
      target: prestart
    container_name: datapulse-prestart
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DB_HOST: postgres
    networks:
      - backend

  app:
    build:
      context: .
      target: app
    container_name: datapulse-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    ports:
      - "8888:8888"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-datapulse}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-datapulse}
      DBT_HOST: postgres
      DBT_PROFILES_DIR: /app/dbt
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
    volumes:
      - "${RAW_SALES_PATH:-./data/raw/sales}:/app/data/raw/sales"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - backend

  api:
    build:
      context: .
      target: api
    container_name: datapulse-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-datapulse}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-datapulse}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      DBT_HOST: postgres
      DBT_PROFILES_DIR: /app/dbt
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
      PIPELINE_WEBHOOK_SECRET: ${PIPELINE_WEBHOOK_SECRET:-}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-datapulse}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-datapulse-frontend}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      # Issuer URL — must match the `iss` claim in tokens.
      # Keycloak stamps tokens with its public hostname (KC_HOSTNAME_URL),
      # which differs from the internal Docker hostname (keycloak:8080).
      KEYCLOAK_PUBLIC_URL: http://localhost:8081
      API_KEY: ${API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini:free}
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`) || PathPrefix(`/health`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    command: ["uvicorn", "datapulse.api.app:create_app", "--host", "0.0.0.0", "--port", "8000", "--factory", "--workers", "4"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend
      - frontend-net

  postgres:
    image: postgres:16-alpine
    container_name: datapulse-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datapulse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: datapulse-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@datapulse.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD must be set}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: datapulse-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    environment:
      # NEXT_PUBLIC_API_URL is intentionally empty — browser calls use same-origin
      # paths (e.g. /api/v1/summary) that are proxied by Next.js rewrites to
      # INTERNAL_API_URL below.  Setting a cross-origin URL here has no effect
      # because NEXT_PUBLIC_* vars are baked in at build time, not runtime.
      - NEXT_PUBLIC_API_URL=
      # Server-side rewrite target — the API container hostname inside Docker.
      - INTERNAL_API_URL=http://api:8000
      - KEYCLOAK_CLIENT_ID=datapulse-frontend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      - KEYCLOAK_ISSUER=http://keycloak:8080/realms/datapulse
      - KEYCLOAK_PUBLIC_URL=http://localhost:8081/realms/datapulse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-to-a-random-secret}
      - NEXTAUTH_DEBUG=true
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - frontend-net

  # ---------- Celery Worker (Async Query Execution) ----------
  celery-worker:
    build:
      context: .
      target: api
    container_name: datapulse-celery-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-datapulse}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-datapulse}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
    command: ["celery", "-A", "datapulse.tasks.celery_app:celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A datapulse.tasks.celery_app:celery_app inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: datapulse-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend

  n8n:
    image: n8nio/n8n:2.13.4
    container_name: datapulse-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-datapulse}
      DB_POSTGRESDB_SCHEMA: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-datapulse}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set}
      WEBHOOK_URL: http://n8n:5678/
      N8N_EDITOR_BASE_URL: http://localhost:5678
      EXECUTIONS_MODE: regular
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PIPELINE_WEBHOOK_SECRET: ${PIPELINE_WEBHOOK_SECRET:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend

  # ---------- Lightdash (BI / Self-serve Analytics) ----------
  lightdash:
    image: lightdash/lightdash:latest
    container_name: datapulse-lightdash
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-datapulse}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATABASE: lightdash
      LIGHTDASH_SECRET: ${LIGHTDASH_SECRET:?LIGHTDASH_SECRET must be set}
      SITE_URL: http://localhost:8085
      ALLOW_MULTIPLE_ORGS: "false"
      LIGHTDASH_LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - backend
      - frontend-net

  # ---------- Keycloak (Auth / OAuth2 / OIDC) ----------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: datapulse-keycloak
    restart: unless-stopped
    command: start --import-realm --hostname-strict=false --http-enabled=true
    ports:
      - "8081:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-datapulse}
      KC_DB_USERNAME: ${POSTGRES_USER:-datapulse}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME_URL: "http://localhost:8081"
      KC_HOSTNAME_ADMIN_URL: "http://localhost:8081"
      KC_HTTP_PORT: "8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q 'UP'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend
      - frontend-net

volumes:
  pgdata:
  pgadmin_data:
  n8n_data:
  redis_data:

networks:
  backend:
    driver: bridge
  frontend-net:
    driver: bridge
