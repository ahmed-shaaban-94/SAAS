services:
  app:
    build: .
    container_name: datapulse-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      DATABASE_URL: postgresql://datapulse:datapulse_dev@postgres:5432/datapulse
      DBT_HOST: postgres
      DBT_PROFILES_DIR: /app/dbt
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datapulse_dev}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./data:/app/data
      - ./notebooks:/app/notebooks
      - ./dbt:/app/dbt

  postgres:
    image: postgres:16-alpine
    container_name: datapulse-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datapulse_dev}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: datapulse-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@datapulse.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
