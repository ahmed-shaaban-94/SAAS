x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  # ---------- Traefik REMOVED — Nginx on host handles reverse proxy ----------
  # Saves 128MB RAM and removes double-proxy latency.

  api:
    build:
      context: .
      target: api
    container_name: datapulse-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-datapulse}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-datapulse}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      DBT_HOST: postgres
      DBT_PROFILES_DIR: /app/dbt
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DB_HOST: postgres
      DB_READER_PASSWORD: ${DB_READER_PASSWORD:?DB_READER_PASSWORD must be set}
      PIPELINE_WEBHOOK_SECRET: ${PIPELINE_WEBHOOK_SECRET:-}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      API_KEY: ${API_KEY:-}
      # NOTE: API_KEY, AUTH0_CLIENT_SECRET, and PIPELINE_WEBHOOK_SECRET default
      # to empty for local dev. In production, set them explicitly or use
      # docker-compose.prod.yml which overrides with :? (required) syntax.
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini:free}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
      BILLING_BASE_URL: ${BILLING_BASE_URL:-https://smartdatapulse.tech}
    ports:
      - "127.0.0.1:8000:8000"
    command: ["gunicorn", "datapulse.api.app:create_app()", "--config", "/app/gunicorn.conf.py"]
    healthcheck:
      # /health/ready checks DB, /health/auth-check validates tenant pipeline.
      # 6 failures x 15s = 90s before marking unhealthy → autoheal restarts.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready'); urllib.request.urlopen('http://localhost:8000/health/auth-check')\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - backend
      - frontend-net
    logging: *default-logging
    stop_grace_period: 35s  # 30s uvicorn drain + 5s buffer before SIGKILL

  postgres:
    image: pgvector/pgvector:pg16
    container_name: datapulse-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datapulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-datapulse}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datapulse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
    logging: *default-logging
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: datapulse-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # NEXT_PUBLIC_API_URL is intentionally empty — browser calls use same-origin
      # paths (e.g. /api/v1/summary) that are proxied by Next.js rewrites to
      # INTERNAL_API_URL below.  Setting a cross-origin URL here has no effect
      # because NEXT_PUBLIC_* vars are baked in at build time, not runtime.
      - NEXT_PUBLIC_API_URL=
      # Server-side rewrite target — the API container hostname inside Docker.
      - INTERNAL_API_URL=http://api:8000
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set}
      - NEXTAUTH_DEBUG=${NEXTAUTH_DEBUG:-false}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => { process.exit(r.statusCode < 400 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    networks:
      - frontend-net

  # NOTE: Celery worker removed — async queries now run in-process via
  # asyncio.to_thread + Redis job state (see datapulse.tasks.async_executor).
  # This saves 512MB RAM and eliminates a separate container.

  redis:
    image: redis:7-alpine
    container_name: datapulse-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --appendonly yes --save 300 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    logging: *default-logging
    networks:
      - backend

  # NOTE: n8n removed — pipeline orchestration + scheduling + notifications
  # now run in-process via datapulse.scheduler (APScheduler) + datapulse.notifications.
  # Saves 512MB RAM + eliminates n8n container + n8n-init container.

  # ---------- File watcher — auto-trigger pipeline on new raw files ----------
  #
  # Opt-in via profile: `docker compose --profile watcher up -d`
  # Skipped by default so `docker compose up` stays lean + doesn't fail when
  # ./data/raw/sales is empty or absent on a fresh clone.
  #
  # Reuses the `api` build target (deps are identical) with a different
  # CMD. Mounts ./data read-only — the watcher never writes to the source
  # bucket; it only POSTs to the API's /pipeline/trigger endpoint.
  #
  # Health: embedded stdlib HTTP server on port 8765 (#512). Docker
  # healthcheck polls /health internally via python's stdlib so the image
  # doesn't need curl.
  watcher:
    build:
      context: .
      target: api
    image: datapulse-api:local
    container_name: datapulse-watcher
    profiles: ["watcher"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8000
      API_KEY: ${API_KEY:-}
      PIPELINE_WEBHOOK_SECRET: ${PIPELINE_WEBHOOK_SECRET:-}
      RAW_SALES_PATH: /app/data/raw/sales
      WATCHER_HEALTH_PORT: ${WATCHER_HEALTH_PORT:-8765}
      # Bind inside the container on all interfaces so the host-side port
      # forward (below) resolves. The port itself is only published on
      # 127.0.0.1 — never exposed on the public interface.
      WATCHER_HEALTH_HOST: "0.0.0.0"
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data:ro
    ports:
      - "127.0.0.1:${WATCHER_HEALTH_PORT:-8765}:8765"
    command: ["python", "-m", "datapulse.watcher"]
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/health', timeout=3)\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - backend
    logging: *default-logging

  # ---------- Lightdash REMOVED — Next.js dashboard replaces it (Wild Wolf beta) ----------
  # Auth0 is a managed SaaS service — no container needed.
  # Configure via AUTH0_* env vars.

volumes:
  pgdata:
  redis_data:

networks:
  backend:
    driver: bridge
    name: datapulse-backend
  frontend-net:
    driver: bridge
    name: datapulse-frontend
