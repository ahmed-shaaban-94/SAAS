# Dev overrides — automatically merged by `docker compose up`
# Base file (docker-compose.yml) uses bare PORT:PORT (binds 0.0.0.0).
# Production should use docker-compose.prod.yml with 127.0.0.1 bindings.
services:
  api:
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./dbt:/app/dbt
      - ./data:/app/data
      - ./migrations:/app/migrations

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - NODE_OPTIONS=--max-old-space-size=1536
    deploy:
      resources:
        limits:
          memory: 2G
