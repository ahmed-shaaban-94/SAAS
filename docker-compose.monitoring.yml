# Monitoring stack — Prometheus + Grafana + uptime watchdog + autoheal
#
# Usage (production only — layered on top of base + prod):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     -f docker-compose.monitoring.yml up -d
#
# Memory budget: 256M Prometheus + 128M Grafana + 64M Alertmanager + 16M watchdog + 32M autoheal = 496M total

services:
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: datapulse-alertmanager
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    healthcheck:
      # `/-/ready` returns 200 only once the config is loaded and peers
      # gossip is healthy — a better signal for autoheal than `/-/healthy`.
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:9093/-/ready
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - datapulse-backend

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: datapulse-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=500MB"
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:9090/-/ready
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - datapulse-backend

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: datapulse-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-datapulse}
      # Serve from /grafana/ subpath behind nginx reverse proxy
      GF_SERVER_ROOT_URL: https://smartdatapulse.tech/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Provisioned datasources/dashboards are read-only in the UI by default;
      # allowUiUpdates: true in dashboards.yml lets you tweak without file changes.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/datapulse-api.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      # /api/health returns {"database":"ok","version":"..."} and 200 once
      # Grafana's DB is migrated and plugins are loaded. Needs a longer
      # start_period than Prom/Alertmanager because migrations run on boot.
      test:
        - CMD-SHELL
        - "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    depends_on:
      - prometheus
    networks:
      - datapulse-backend
      - datapulse-frontend

  # Lightweight uptime watchdog — checks /health/live every 30s,
  # alerts to Slack after 4 consecutive failures (2 min), sends
  # recovery message when API comes back.
  uptime-watchdog:
    image: alpine:3.20
    container_name: datapulse-uptime
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl > /dev/null 2>&1
        FAIL_COUNT=0
        AUTH_FAIL=0
        while true; do
          HTTP_CODE=$$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://api:8000/health/live 2>/dev/null || echo "000")
          AUTH_CODE=$$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 http://api:8000/health/auth-check 2>/dev/null || echo "000")

          if [ "$$HTTP_CODE" != "200" ]; then
            FAIL_COUNT=$$((FAIL_COUNT + 1))
            echo "$$(date -Iseconds) FAIL ($$FAIL_COUNT): /health/live returned $$HTTP_CODE"
            if [ "$$FAIL_COUNT" -ge 4 ] && [ -n "$$SLACK_WEBHOOK" ]; then
              curl -s -X POST "$$SLACK_WEBHOOK" \
                -H 'Content-Type: application/json' \
                -d "{\"text\": \":rotating_light: <!channel> *DataPulse API DOWN* -- /health/live returned $$HTTP_CODE for $$((FAIL_COUNT * 30))s\", \"username\": \"Uptime Monitor\", \"icon_emoji\": \":rotating_light:\"}" || true
              FAIL_COUNT=0
            fi
          else
            if [ "$$FAIL_COUNT" -ge 4 ]; then
              curl -s -X POST "$$SLACK_WEBHOOK" \
                -H 'Content-Type: application/json' \
                -d "{\"text\": \":white_check_mark: DataPulse API recovered -- /health/live is 200 again\", \"username\": \"Uptime Monitor\", \"icon_emoji\": \":white_check_mark:\"}" || true
            fi
            FAIL_COUNT=0
          fi

          if [ "$$AUTH_CODE" != "200" ]; then
            AUTH_FAIL=$$((AUTH_FAIL + 1))
            echo "$$(date -Iseconds) AUTH_FAIL ($$AUTH_FAIL): /health/auth-check returned $$AUTH_CODE"
            if [ "$$AUTH_FAIL" -ge 4 ] && [ -n "$$SLACK_WEBHOOK" ]; then
              curl -s -X POST "$$SLACK_WEBHOOK" \
                -H 'Content-Type: application/json' \
                -d "{\"text\": \":warning: <!channel> *DataPulse AUTH BROKEN* -- /health/auth-check returned $$AUTH_CODE. All user requests will fail with 401.\", \"username\": \"Uptime Monitor\", \"icon_emoji\": \":warning:\"}" || true
              AUTH_FAIL=0
            fi
          else
            if [ "$$AUTH_FAIL" -ge 4 ]; then
              curl -s -X POST "$$SLACK_WEBHOOK" \
                -H 'Content-Type: application/json' \
                -d "{\"text\": \":white_check_mark: DataPulse auth pipeline recovered\", \"username\": \"Uptime Monitor\", \"icon_emoji\": \":white_check_mark:\"}" || true
            fi
            AUTH_FAIL=0
          fi
          sleep 30
        done
    environment:
      SLACK_WEBHOOK: ${SLACK_WEBHOOK_URL:-}
    deploy:
      resources:
        limits:
          memory: 16M
          cpus: "0.05"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - datapulse-backend

  # Autoheal — restarts containers Docker marks as unhealthy.
  # Requires API healthcheck to point to /health/ready (checks DB).
  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: datapulse-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 120
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.05"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - datapulse-backend

volumes:
  prometheus_data:
  grafana_data:

networks:
  datapulse-backend:
    external: true
    name: datapulse-backend
  datapulse-frontend:
    external: true
    name: datapulse-frontend
