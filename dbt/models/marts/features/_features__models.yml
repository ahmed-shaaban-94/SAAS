version: 2

models:
  # -- feat_revenue_daily_rolling ------------------------------------------------
  - name: feat_revenue_daily_rolling
    description: "Daily revenue rolling features for forecasting. Grain: (tenant_id, date_key). Provides moving averages (7/30/90d), volatility, trend ratios, and lag comparisons."
    meta:
      label: "Revenue Daily Rolling"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: date_key
        description: "Foreign key to dim_date (unique per tenant)"
        tests: [not_null]
      - name: full_date
        tests: [not_null]
      - name: daily_net_amount
        description: "Total net sales for the day"
        tests: [not_null]
      - name: ma_7d_revenue
        description: "7-day moving average of daily net revenue"
      - name: ma_30d_revenue
        description: "30-day moving average of daily net revenue"
      - name: ma_90d_revenue
        description: "90-day moving average of daily net revenue"
      - name: ma_7d_txn
        description: "7-day moving average of daily transactions"
      - name: ma_30d_txn
        description: "30-day moving average of daily transactions"
      - name: volatility_30d
        description: "30-day standard deviation of daily net revenue"
      - name: trend_ratio_7d_30d
        description: "ma_7d / ma_30d — above 1.0 = accelerating trend"
      - name: trend_ratio_30d_90d
        description: "ma_30d / ma_90d — above 1.0 = accelerating trend"
      - name: deviation_from_ma30
        description: "Relative deviation of daily value from 30-day MA"
      - name: same_day_last_week
        description: "Net revenue from 7 days ago"
      - name: same_day_last_year
        description: "Net revenue from 364 days ago (approximate)"

  # -- feat_seasonality_daily ---------------------------------------------------
  - name: feat_seasonality_daily
    description: "Day-of-week seasonality indices. Grain: (tenant_id, day_of_week) — 7 rows per tenant. Egypt weekend: Fri(5) & Sat(6)."
    meta:
      label: "Daily Seasonality"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: day_of_week
        description: "ISO day of week (1=Monday, 7=Sunday)"
        tests: [not_null]
      - name: day_name
        tests: [not_null]
      - name: is_weekend
        description: "True for Friday/Saturday (Egypt weekend)"
        tests: [not_null]
      - name: avg_revenue_by_dow
        description: "Average daily revenue for this day of week"
        tests: [not_null]
      - name: dow_revenue_index
        description: "Seasonal index: 1.0 = average day, >1 = above average"
        tests: [not_null]
      - name: dow_txn_index
        description: "Transaction seasonal index"
        tests: [not_null]
      - name: sample_count
        description: "Number of days used to compute averages"
        tests: [not_null]

  # -- feat_seasonality_monthly -------------------------------------------------
  - name: feat_seasonality_monthly
    description: "Monthly seasonality indices. Grain: (tenant_id, month) — 12 rows per tenant."
    meta:
      label: "Monthly Seasonality"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: month
        description: "Calendar month (1-12)"
        tests: [not_null]
      - name: month_name
        tests: [not_null]
      - name: avg_monthly_revenue
        description: "Average monthly revenue across all years"
        tests: [not_null]
      - name: month_revenue_index
        description: "Seasonal index: 1.0 = average month, >1 = above average"
        tests: [not_null]
      - name: month_txn_index
        description: "Transaction seasonal index"
        tests: [not_null]
      - name: years_of_data
        description: "Number of distinct years contributing to this average"
        tests: [not_null]

  # -- feat_customer_segments ---------------------------------------------------
  - name: feat_customer_segments
    description: "Customer RFM segmentation. Grain: (tenant_id, customer_key). Segments: Champion, Loyal, New, At Risk, Cant Lose, Hibernating, Potential Loyalist."
    meta:
      label: "Customer Segments"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: customer_key
        description: "Foreign key to dim_customer"
        tests: [not_null]
      - name: customer_id
        tests: [not_null]
      - name: customer_name
        tests: [not_null]
      - name: days_since_last
        description: "Days since last purchase (Recency)"
        tests: [not_null]
      - name: frequency
        description: "Count of distinct invoices (Frequency)"
        tests: [not_null]
      - name: monetary
        description: "Total net amount spent (Monetary)"
        tests: [not_null]
      - name: r_score
        description: "Recency quintile (1-5, higher = more recent)"
        tests: [not_null]
      - name: f_score
        description: "Frequency quintile (1-5, higher = more frequent)"
        tests: [not_null]
      - name: m_score
        description: "Monetary quintile (1-5, higher = more valuable)"
        tests: [not_null]
      - name: rfm_segment
        description: "Segment label derived from RFM scores"
        tests:
          - not_null
          - accepted_values:
              values: ['Champion', 'Loyal', 'New', 'At Risk', 'Cant Lose', 'Hibernating', 'Potential Loyalist']

  # -- feat_product_lifecycle ---------------------------------------------------
  - name: feat_product_lifecycle
    description: "Product lifecycle classification. Grain: (tenant_id, product_key). Phases: Growth, Mature, Decline, Dormant."
    meta:
      label: "Product Lifecycle"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: product_key
        description: "Foreign key to dim_product"
        tests: [not_null]
      - name: drug_code
        tests: [not_null]
      - name: drug_name
        tests: [not_null]
      - name: avg_recent_growth
        description: "Average QoQ revenue growth over last 4 quarters"
      - name: lifecycle_phase
        description: "Product lifecycle stage"
        tests:
          - not_null
          - accepted_values:
              values: ['Growth', 'Mature', 'Decline', 'Dormant']
      - name: quarters_active
        description: "Number of distinct quarters with sales"
        tests: [not_null]
      - name: total_lifetime_revenue
        description: "Total revenue across entire history"
        tests: [not_null]

  # -- feat_revenue_site_rolling -----------------------------------------------
  - name: feat_revenue_site_rolling
    description: "Per-site daily rolling features with cross-site comparison. Grain: (tenant_id, date_key, site_key)."
    meta:
      label: "Revenue Site Rolling"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: date_key
        description: "Foreign key to dim_date"
        tests: [not_null]
      - name: site_key
        description: "Foreign key to dim_site"
        tests: [not_null]
      - name: daily_net_amount
        tests: [not_null]
      - name: site_ma_7d
        description: "7-day moving average for this site"
      - name: site_ma_30d
        description: "30-day moving average for this site"
      - name: site_vs_avg_ratio
        description: "Site MA30 / cross-site average MA30 (>1 = outperforming)"
      - name: site_revenue_share
        description: "Site 30-day revenue as fraction of total"

  # -- feat_customer_health ----------------------------------------------------
  - name: feat_customer_health
    description: "Customer Health Score — composite 0-100 score per customer based on recency, frequency, monetary value, return rate, and trend."
    meta:
      label: "Customer Health"
    columns:
      - name: tenant_id
        description: "Tenant identifier"
      - name: customer_key
        description: "FK to dim_customer"
      - name: health_score
        description: "Composite health score (0-100)"
      - name: health_band
        description: "Thriving / Healthy / Needs Attention / At Risk / Critical"

  # -- feat_churn_prediction ------------------------------------------------------
  - name: feat_churn_prediction
    description: "Customer churn prediction. Grain: (tenant_id, customer_key). Logistic probability based on recency, frequency, trend, and health score."
    meta:
      label: "Churn Prediction"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: customer_key
        tests: [not_null]
      - name: churn_probability
        description: "Probability of churn (0-1)"
      - name: risk_level
        description: "high / medium / low"
        tests:
          - accepted_values:
              values: ["high", "medium", "low"]

  # -- feat_product_affinity ------------------------------------------------------
  - name: feat_product_affinity
    description: "Product co-purchase affinity. Grain: (tenant_id, product_key_a, product_key_b). Shows co-occurrence count, support, and confidence for product pairs."
    meta:
      label: "Product Affinity"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: product_key_a
        tests: [not_null]
      - name: product_key_b
        tests: [not_null]
      - name: co_occurrence_count
        description: "Number of invoices containing both products"
      - name: support_pct
        description: "Co-occurrence / total invoices * 100"
      - name: confidence_a_to_b
        description: "P(B|A) = co-occurrence / invoices_with_A * 100"

  # -- feat_staff_quota -----------------------------------------------------------
  - name: feat_staff_quota
    description: "Staff quota attainment — actual sales vs targets per staff member per month. Grain: (tenant_id, staff_key, year, month)."
    meta:
      label: "Staff Quota"
    columns:
      - name: tenant_id
        tests: [not_null]
      - name: staff_key
        description: "FK to dim_staff"
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: month
        tests: [not_null]
      - name: staff_name
        description: "Staff member name"
      - name: actual_revenue
        description: "Actual net revenue for the period"
      - name: target_revenue
        description: "Revenue target for the period (from sales_targets)"
      - name: revenue_achievement_pct
        description: "Actual / Target * 100 for revenue"
      - name: transactions_achievement_pct
        description: "Actual / Target * 100 for transactions"
      - name: revenue_variance
        description: "Actual revenue minus target revenue"
