version: 2

models:
  # ── agg_basket_margin ────────────────────────────────────────────────
  - name: agg_basket_margin
    description: "Per-cashier × per-shift × per-basket gross margin from POS transactions. Grain: one row per completed transaction."
    meta:
      label: "Basket Margin"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: shift_id
        description: "FK to pos.shift_records — the shift this basket belongs to"
        tests:
          - not_null
      - name: staff_id
        description: "Cashier who processed the transaction"
        tests:
          - not_null
      - name: transaction_id
        description: "PK of pos.transactions"
        tests:
          - not_null
          - unique
      - name: txn_date
        description: "Calendar date the transaction was completed (day-truncated)"
        tests:
          - not_null
      - name: revenue
        description: "Sum of unit_price * quantity for all items in the basket"
        tests:
          - not_null
      - name: cost
        description: "Sum of cost_per_unit * quantity (NULL items treated as 0 cost)"
      - name: gross_margin
        description: "Revenue minus cost (COALESCE(cost_per_unit, 0) so NULL cost rows contribute 100% margin)"
        tests:
          - not_null
      - name: margin_pct
        description: "gross_margin / revenue (NULL when revenue = 0)"
    # M11 invariants (audit 2026-04-26):
    #   - gross_margin = revenue - COALESCE(cost, 0)
    #   - margin_pct in [-1, 1] (or NULL)
    # Implemented as singular tests under dbt/tests/ because dbt_utils
    # is not in this project's package list (only dbt_expectations is).

  # ── agg_margin_analysis ──────────────────────────────────────────────
  - name: agg_margin_analysis
    description: "Margin analysis per product per month. Revenue from fct_sales, COGS from weighted average PO unit prices."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: product_key
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: month
        tests:
          - not_null
      - name: revenue
        description: "Total gross sales revenue for the period"
      - name: cogs
        description: "Cost of goods sold (units_sold * weighted_unit_cost)"
      - name: gross_margin
        description: "Revenue minus COGS"
      - name: margin_pct
        description: "Gross margin as a fraction of revenue (0-1)"

  # ── agg_supplier_performance ─────────────────────────────────────────
  - name: agg_supplier_performance
    description: "Supplier performance metrics. Grain: one row per supplier. Includes avg lead time, fill rate, and total spend."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: supplier_key
        tests:
          - not_null
      - name: total_orders
        description: "Total number of purchase orders placed"
      - name: fill_rate
        description: "Fraction of ordered value that was received (0-1)"
      - name: avg_lead_days
        description: "Average actual lead time in days for received orders"
      - name: total_spend
        description: "Sum of total ordered values across all POs"

  # ── agg_sales_daily ──────────────────────────────────────────────────
  - name: agg_sales_daily
    description: "Daily sales aggregation. Grain: (date_key, site_key, billing_way)"
    meta:
      label: "Daily Sales"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - date_key
            - site_key
            - billing_way
    columns:
      - name: date_key
        description: "Foreign key to dim_date"
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: site_key
        description: "Foreign key to dim_site"
        tests:
          - not_null
          - relationships:
              to: ref('dim_site')
              field: site_key
      - name: billing_way
        description: "Billing method (Credit, Cash, etc.)"
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Cash'
                - 'Credit'
                - 'Insurance'
                - 'Delivery'
                - 'Pick-Up'
                - 'Cash Return'
                - 'Credit Return'
                - 'Delivery Return'
                - 'Delivery Credit'
                - 'Delivery Credit Return'
                - 'Pick-Up Return'
      - name: total_quantity
        description: "Sum of item quantities sold"
        meta:
          metrics:
            daily_total_quantity:
              type: sum
        tests:
          - not_null
      - name: total_sales
        description: "Sum of gross sales amount"
        meta:
          metrics:
            daily_total_sales:
              type: sum
        tests:
          - not_null
      - name: total_discount
        description: "Sum of discount amount"
        meta:
          metrics:
            daily_total_discount:
              type: sum
        tests:
          - not_null
      - name: total_net_amount
        description: "Sum of net sales amount (sales minus discount)"
        meta:
          metrics:
            daily_total_net_amount:
              type: sum
            daily_avg_net_amount:
              type: average
        tests:
          - not_null
      - name: transaction_count
        description: "Number of transactions"
        meta:
          metrics:
            daily_total_transactions:
              type: sum
        tests:
          - not_null
      - name: return_count
        description: "Number of return transactions"
        meta:
          metrics:
            daily_total_returns:
              type: sum
        tests:
          - not_null
      - name: unique_customers
        description: "Count of distinct customers"
        meta:
          metrics:
            daily_total_unique_customers:
              type: sum
        tests:
          - not_null
      - name: unique_products
        description: "Count of distinct products"
        meta:
          metrics:
            daily_total_unique_products:
              type: sum
        tests:
          - not_null
      - name: avg_basket_size
        description: "Average net amount per invoice"
        meta:
          metrics:
            daily_avg_basket_size:
              type: average

  # ── agg_sales_monthly ───────────────────────────────────────────────
  - name: agg_sales_monthly
    description: "Monthly sales aggregation with MoM and YoY growth. Grain: (year, month, site_key)"
    meta:
      label: "Monthly Sales"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - year
            - month
            - site_key
    columns:
      - name: year
        description: "Calendar year"
        tests:
          - not_null
      - name: month
        description: "Calendar month number (1-12)"
        tests:
          - not_null
      - name: site_key
        description: "Foreign key to dim_site"
        tests:
          - not_null
          - relationships:
              to: ref('dim_site')
              field: site_key
      - name: quarter
        description: "Calendar quarter (1-4)"
        tests:
          - not_null
      - name: month_name
        description: "Calendar month name (January, February, etc.)"
        tests:
          - not_null
      - name: total_quantity
        description: "Sum of item quantities sold"
        tests:
          - not_null
      - name: total_sales
        description: "Sum of gross sales amount"
        tests:
          - not_null
      - name: total_discount
        description: "Sum of discount amount"
        tests:
          - not_null
      - name: total_net_amount
        description: "Sum of net sales amount"
        tests:
          - not_null
      - name: transaction_count
        description: "Number of transactions"
        tests:
          - not_null
      - name: return_count
        description: "Number of return transactions"
        tests:
          - not_null
      - name: return_rate
        description: "Ratio of returns to total transactions"
      - name: unique_customers
        description: "Count of distinct customers"
        tests:
          - not_null
      - name: unique_products
        description: "Count of distinct products"
        tests:
          - not_null
      - name: unique_staff
        description: "Count of distinct staff members"
        tests:
          - not_null
      - name: walk_in_count
        description: "Number of walk-in transactions"
        tests:
          - not_null
      - name: insurance_count
        description: "Number of insurance transactions"
        tests:
          - not_null
      - name: avg_basket_size
        description: "Average net amount per invoice"
      - name: mom_growth_pct
        description: "Month-over-month net amount growth percentage"
      - name: yoy_growth_pct
        description: "Year-over-year net amount growth percentage"

  # ── agg_sales_by_product ────────────────────────────────────────────
  - name: agg_sales_by_product
    description: "Product sales aggregation with denormalized product attributes. Grain: (product_key, year, month)"
    meta:
      label: "Sales by Product"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - product_key
            - year
            - month
    columns:
      - name: product_key
        description: "Foreign key to dim_product"
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: year
        description: "Calendar year"
        tests:
          - not_null
      - name: month
        description: "Calendar month number (1-12)"
        tests:
          - not_null
      - name: drug_code
        description: "Product drug code"
      - name: drug_name
        description: "Product drug name"
      - name: drug_brand
        description: "Product brand"
      - name: drug_category
        description: "Product category"
      - name: drug_division
        description: "Product division"
      - name: month_name
        description: "Calendar month name"
      - name: total_quantity
        description: "Sum of item quantities sold"
        tests:
          - not_null
      - name: return_quantity
        description: "Sum of returned item quantities"
        tests:
          - not_null
      - name: total_sales
        description: "Sum of gross sales amount"
        tests:
          - not_null
      - name: total_discount
        description: "Sum of discount amount"
        tests:
          - not_null
      - name: total_net_amount
        description: "Sum of net sales amount"
        tests:
          - not_null
      - name: transaction_count
        description: "Number of transactions"
        tests:
          - not_null
      - name: return_count
        description: "Number of return transactions"
        tests:
          - not_null
      - name: return_rate
        description: "Ratio of returns to total transactions"
      - name: unique_customers
        description: "Count of distinct customers"
        tests:
          - not_null
      - name: unique_sites
        description: "Count of distinct sites selling this product"
        tests:
          - not_null
      - name: avg_basket_size
        description: "Average net amount per invoice"

  # ── agg_sales_by_customer ───────────────────────────────────────────
  - name: agg_sales_by_customer
    description: "Customer sales aggregation with denormalized customer attributes. Grain: (customer_key, year, month)"
    meta:
      label: "Sales by Customer"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - customer_key
            - year
            - month
    columns:
      - name: customer_key
        description: "Foreign key to dim_customer"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: year
        description: "Calendar year"
        tests:
          - not_null
      - name: month
        description: "Calendar month number (1-12)"
        tests:
          - not_null
      - name: customer_id
        description: "Business customer identifier"
      - name: customer_name
        description: "Customer name"
      - name: month_name
        description: "Calendar month name"
      - name: total_quantity
        description: "Sum of item quantities purchased"
        tests:
          - not_null
      - name: total_sales
        description: "Sum of gross sales amount"
        tests:
          - not_null
      - name: total_discount
        description: "Sum of discount amount"
        tests:
          - not_null
      - name: total_net_amount
        description: "Sum of net sales amount"
        tests:
          - not_null
      - name: transaction_count
        description: "Number of transactions"
        tests:
          - not_null
      - name: return_count
        description: "Number of return transactions"
        tests:
          - not_null
      - name: unique_products
        description: "Count of distinct products purchased"
        tests:
          - not_null
      - name: walk_in_count
        description: "Number of walk-in transactions"
        tests:
          - not_null
      - name: insurance_count
        description: "Number of insurance transactions"
        tests:
          - not_null
      - name: avg_basket_size
        description: "Average net amount per invoice"

  # ── agg_sales_by_site ──────────────────────────────────────────────
  - name: agg_sales_by_site
    description: "Site performance aggregation with volume, diversity, and ratio metrics. Grain: (site_key, year, month)"
    meta:
      label: "Sales by Site"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - site_key
            - year
            - month
    columns:
      - name: site_key
        description: "Foreign key to dim_site"
        tests:
          - not_null
          - relationships:
              to: ref('dim_site')
              field: site_key
      - name: year
        description: "Calendar year"
        tests:
          - not_null
      - name: month
        description: "Calendar month number (1-12)"
        tests:
          - not_null
      - name: site_code
        description: "Business site code"
      - name: site_name
        description: "Site name"
      - name: area_manager
        description: "Area manager responsible for the site"
      - name: total_quantity
        description: "Sum of item quantities sold"
        tests:
          - not_null
      - name: total_sales
        description: "Sum of gross sales amount"
        tests:
          - not_null
      - name: total_discount
        description: "Sum of discount amount"
        tests:
          - not_null
      - name: total_net_amount
        description: "Sum of net sales amount"
        tests:
          - not_null
      - name: transaction_count
        description: "Number of transactions"
        tests:
          - not_null
      - name: unique_customers
        description: "Count of distinct customers"
        tests:
          - not_null
      - name: unique_products
        description: "Count of distinct products"
        tests:
          - not_null
      - name: unique_staff
        description: "Count of distinct staff members"
        tests:
          - not_null
      - name: return_count
        description: "Number of return transactions"
        tests:
          - not_null
      - name: return_rate
        description: "Ratio of returns to total transactions"
      - name: walk_in_ratio
        description: "Ratio of walk-in transactions to total"
      - name: insurance_ratio
        description: "Ratio of insurance transactions to total"

  # ── agg_sales_by_staff ─────────────────────────────────────────────
  - name: agg_sales_by_staff
    description: "Staff performance aggregation with volume, diversity, and avg transaction value. Grain: (staff_key, year, month)"
    meta:
      label: "Sales by Staff"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - staff_key
            - year
            - month
    columns:
      - name: staff_key
        description: "Foreign key to dim_staff"
        tests:
          - not_null
          - relationships:
              to: ref('dim_staff')
              field: staff_key
      - name: year
        description: "Calendar year"
        tests:
          - not_null
      - name: month
        description: "Calendar month number (1-12)"
        tests:
          - not_null
      - name: staff_id
        description: "Business staff identifier (personnel number)"
      - name: staff_name
        description: "Staff member name"
      - name: staff_position
        description: "Staff job position"
      - name: total_quantity
        description: "Sum of item quantities sold"
        tests:
          - not_null
      - name: total_sales
        description: "Sum of gross sales amount"
        tests:
          - not_null
      - name: total_discount
        description: "Sum of discount amount"
        tests:
          - not_null
      - name: total_net_amount
        description: "Sum of net sales amount"
        tests:
          - not_null
      - name: transaction_count
        description: "Number of transactions"
        tests:
          - not_null
      - name: unique_customers
        description: "Count of distinct customers served"
        tests:
          - not_null
      - name: unique_products
        description: "Count of distinct products sold"
        tests:
          - not_null
      - name: return_count
        description: "Number of return transactions"
        tests:
          - not_null
      - name: avg_transaction_value
        description: "Average net amount per transaction"
        tests:
          - not_null

  # ── agg_returns ────────────────────────────────────────────────────
  - name: agg_returns
    description: "Returns analysis aggregation (only return transactions). Grain: (product_key, customer_key, year, month, billing_way)"
    meta:
      label: "Returns"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - product_key
            - customer_key
            - year
            - month
            - billing_way
    columns:
      - name: product_key
        description: "Foreign key to dim_product"
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: customer_key
        description: "Foreign key to dim_customer"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: year
        description: "Calendar year"
        tests:
          - not_null
      - name: month
        description: "Calendar month number (1-12)"
        tests:
          - not_null
      - name: billing_way
        description: "Billing method (Credit, Cash, etc.)"
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Cash Return'
                - 'Credit Return'
                - 'Delivery Return'
                - 'Delivery Credit Return'
                - 'Pick-Up Return'
      - name: drug_name
        description: "Product drug name (denormalized from dim_product)"
      - name: customer_name
        description: "Customer name (denormalized from dim_customer)"
      - name: return_quantity
        description: "Absolute sum of returned item quantities"
        tests:
          - not_null
      - name: return_amount
        description: "Absolute sum of returned net amount"
        tests:
          - not_null
      - name: return_count
        description: "Number of return transactions"
        tests:
          - not_null

  # ── metrics_summary ────────────────────────────────────────────────
  - name: metrics_summary
    description: "Daily metrics summary with MTD and YTD running totals. Grain: (date_key) — one row per day aggregated across all sites and billing ways"
    meta:
      label: "Metrics Summary"
    columns:
      - name: date_key
        description: "Foreign key to dim_date (unique per row)"
        tests:
          - not_null
          - unique
      - name: full_date
        description: "Calendar date"
        tests:
          - not_null
      - name: year
        description: "Calendar year"
        tests:
          - not_null
      - name: month
        description: "Calendar month number (1-12)"
        tests:
          - not_null
      - name: daily_gross_amount
        description: "Total gross sales amount for the day"
        tests:
          - not_null
      - name: daily_net_amount
        description: "Deprecated alias for daily_gross_amount (backward compat)"
        tests:
          - not_null:
              config:
                severity: warn
      - name: daily_transactions
        description: "Total number of transactions for the day"
        tests:
          - not_null
      - name: daily_returns
        description: "Total number of return transactions for the day"
        tests:
          - not_null
      - name: daily_unique_customers
        description: "Total distinct customers for the day"
        tests:
          - not_null
      - name: mtd_gross_amount
        description: "Month-to-date cumulative gross sales amount"
        tests:
          - not_null
      - name: mtd_net_amount
        description: "Deprecated alias for mtd_gross_amount (backward compat)"
        tests:
          - not_null:
              config:
                severity: warn
      - name: mtd_transactions
        description: "Month-to-date cumulative transaction count"
        tests:
          - not_null
      - name: ytd_gross_amount
        description: "Year-to-date cumulative gross sales amount"
        tests:
          - not_null
      - name: ytd_net_amount
        description: "Deprecated alias for ytd_gross_amount (backward compat)"
        tests:
          - not_null:
              config:
                severity: warn
      - name: ytd_transactions
        description: "Year-to-date cumulative transaction count"
        tests:
          - not_null
