version: 2

models:
  - name: dim_date
    description: "Calendar dimension (2023-01-01 to 2025-12-31). Egypt weekend = Friday & Saturday. Includes sort columns for Power BI and ISO week columns."
    columns:
      - name: date_key
        description: "Surrogate key, YYYYMMDD integer format"
        tests:
          - unique
          - not_null
      - name: full_date
        description: "Calendar date (DATE type)"
        tests:
          - not_null
      - name: year
        description: "4-digit year (e.g. 2024)"
      - name: quarter
        description: "Quarter number 1-4"
      - name: month
        description: "Month number 1-12. Also serves as sort column for month_name in Power BI."
      - name: month_name
        description: "Full month name (e.g. January). Sort by month column."
      - name: day_of_week
        description: "ISO day of week (1=Monday, 7=Sunday). Also serves as sort column for day_name."
      - name: day_name
        description: "Full day name (e.g. Monday). Sort by day_of_week column."
      - name: is_weekend
        description: "True for Friday (5) and Saturday (6) — Egypt weekend"
      - name: week_number
        description: "ISO week number (1-53)"
      - name: week_start_date
        description: "Monday of the ISO week (DATE type)"
      - name: year_week
        description: "Year-week label (e.g. 2024-W03)"
      - name: quarter_label
        description: "Quarter label (e.g. Q1 2024)"
      - name: year_month
        description: "Year-month label (e.g. 2024-01)"

  - name: dim_billing
    description: "Billing type dimension. Maps 10 billing_way values to 5 billing_group categories (Cash, Credit, Delivery, Delivery Credit, Pick-Up). Includes Unknown member (key=-1)."
    columns:
      - name: billing_key
        description: "Surrogate key (INT). -1 = Unknown."
        tests:
          - unique
          - not_null
      - name: billing_way
        description: "Original billing type (e.g. Cash, Credit Return)"
        tests:
          - unique
          - not_null
      - name: billing_group
        description: "Billing channel group: Cash, Credit, Delivery, Delivery Credit, Pick-Up, or Unknown"
        tests:
          - not_null
          - accepted_values:
              values: ['Cash', 'Credit', 'Delivery', 'Delivery Credit', 'Pick-Up', 'Unknown']
      - name: is_return_type
        description: "True if this billing type represents a return transaction"
        tests:
          - not_null

  - name: dim_customer
    description: "Customer dimension (SCD Type 1 — latest attribute wins). Includes Unknown member (key=-1) for unmatched rows."
    columns:
      - name: customer_key
        description: "Surrogate key (INT). -1 = Unknown."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Natural key from source system"
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "Customer display name (latest known)"
        tests:
          - not_null

  - name: dim_product
    description: "Product/drug dimension (SCD Type 1 — latest attribute wins). Includes buyer and full classification hierarchy. Unknown member at key=-1. Note: drug_status is current-state only, not time-aware."
    columns:
      - name: product_key
        description: "Surrogate key (INT). -1 = Unknown."
        tests:
          - unique
          - not_null
      - name: drug_code
        description: "Natural key — unique material/drug code"
        tests:
          - unique
          - not_null
      - name: drug_name
        description: "Product/drug display name"
        tests:
          - not_null
      - name: drug_brand
        description: "Brand name"
      - name: drug_cluster
        description: "Item cluster grouping"
      - name: drug_status
        description: "Current product status: Active, Cancelled, Delisted, New, Unknown. WARNING: SCD Type 1 — reflects current state, not historical."
        tests:
          - accepted_values:
              values: ['Active', 'Cancelled', 'Delisted', 'New', 'Unknown']
      - name: is_temporary
        description: "True if product has temporary (-T) status suffix"
      - name: drug_category
        description: "Product category"
      - name: drug_subcategory
        description: "Product subcategory"
      - name: drug_division
        description: "Product division"
      - name: drug_segment
        description: "Product segment"
      - name: buyer
        description: "Business owner of the product relationship"

  - name: dim_site
    description: "Site/location dimension (SCD Type 1). Includes area_manager for geographic grouping. Unknown member at key=-1."
    columns:
      - name: site_key
        description: "Surrogate key (INT). -1 = Unknown."
        tests:
          - unique
          - not_null
      - name: site_code
        description: "Natural key — site identifier"
        tests:
          - unique
          - not_null
      - name: site_name
        description: "Site/pharmacy display name"
        tests:
          - not_null
      - name: area_manager
        description: "Geographic area manager for this site"

  - name: dim_staff
    description: "Staff/personnel dimension (SCD Type 1). Unknown member at key=-1."
    columns:
      - name: staff_key
        description: "Surrogate key (INT). -1 = Unknown."
        tests:
          - unique
          - not_null
      - name: staff_id
        description: "Natural key — personnel number"
        tests:
          - unique
          - not_null
      - name: staff_name
        description: "Staff display name"
        tests:
          - not_null
      - name: staff_position
        description: "Job position/title"

  - name: fct_sales
    description: "Sales fact table. Grain: one line-item per invoice. Integer surrogate keys with COALESCE to -1 (Unknown). Financials rounded to 2 decimals."
    columns:
      - name: sales_key
        description: "Surrogate primary key"
        tests:
          - unique
          - not_null
      - name: date_key
        description: "FK to dim_date (YYYYMMDD integer)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: product_key
        description: "FK to dim_product (-1 = Unknown)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: customer_key
        description: "FK to dim_customer (-1 = Unknown)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: site_key
        description: "FK to dim_site (-1 = Unknown)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_site')
              field: site_key
      - name: staff_key
        description: "FK to dim_staff (-1 = Unknown)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_staff')
              field: staff_key
      - name: billing_key
        description: "FK to dim_billing (-1 = Unknown)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_billing')
              field: billing_key
      - name: invoice_id
        description: "Degenerate dimension — invoice reference number"
      - name: billing_way
        description: "Degenerate dimension — billing type text (also resolved via billing_key)"
      - name: quantity
        description: "Units sold/returned (negative for returns). Rounded to 2 decimals."
        tests:
          - not_null
      - name: sales
        description: "Gross sales amount before discount. Rounded to 2 decimals."
        tests:
          - not_null
      - name: discount
        description: "Discount amount. Rounded to 2 decimals."
        tests:
          - not_null
      - name: net_amount
        description: "Net amount = sales - discount. Rounded to 2 decimals."
        tests:
          - not_null
      - name: is_return
        description: "True if this is a return transaction (by billing type or negative quantity)"
        tests:
          - not_null
      - name: is_walk_in
        description: "True if customer_id = site_code (counter/walk-in sale)"
        tests:
          - not_null
      - name: has_insurance
        description: "True if an insurance number is present on the transaction"
        tests:
          - not_null
