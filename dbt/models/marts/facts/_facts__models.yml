version: 2

models:
  - name: fct_sales
    description: "Sales fact table. Grain: one line-item per invoice. Integer surrogate keys with COALESCE to -1 (Unknown). Financials rounded to 2 decimals."
    meta:
      joins:
        - join: dim_date
          sql_on: "${fct_sales.date_key} = ${dim_date.date_key}"
        - join: dim_product
          sql_on: "${fct_sales.product_key} = ${dim_product.product_key}"
        - join: dim_customer
          sql_on: "${fct_sales.customer_key} = ${dim_customer.customer_key}"
        - join: dim_site
          sql_on: "${fct_sales.site_key} = ${dim_site.site_key}"
        - join: dim_staff
          sql_on: "${fct_sales.staff_key} = ${dim_staff.staff_key}"
        - join: dim_billing
          sql_on: "${fct_sales.billing_key} = ${dim_billing.billing_key}"
    columns:
      - name: sales_key
        description: "Surrogate primary key"
        tests:
          - unique
          - not_null
      - name: date_key
        description: "FK to dim_date (YYYYMMDD integer)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: product_key
        description: "FK to dim_product (-1 = Unknown)"
        meta:
          metrics:
            unique_products:
              type: count_distinct
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: customer_key
        description: "FK to dim_customer (-1 = Unknown)"
        meta:
          metrics:
            unique_customers:
              type: count_distinct
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: site_key
        description: "FK to dim_site (-1 = Unknown)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_site')
              field: site_key
      - name: staff_key
        description: "FK to dim_staff (-1 = Unknown)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_staff')
              field: staff_key
      - name: billing_key
        description: "FK to dim_billing (-1 = Unknown)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_billing')
              field: billing_key
      - name: loaded_at
        description: "Timestamp when the source row was loaded into bronze (used as incremental watermark)"
        tests:
          - not_null
      - name: invoice_id
        description: "Degenerate dimension — invoice reference number"
        meta:
          metrics:
            transaction_count:
              type: count_distinct
      - name: billing_way
        description: "Degenerate dimension — billing type text (also resolved via billing_key)"
      - name: quantity
        description: "Units sold/returned (negative for returns). Rounded to 2 decimals."
        meta:
          metrics:
            total_quantity:
              type: sum
        tests:
          - not_null
      - name: sales
        description: "Gross sales amount before discount. Rounded to 2 decimals."
        meta:
          metrics:
            total_gross_sales:
              type: sum
        tests:
          - not_null
      - name: discount
        description: "Discount amount. Rounded to 2 decimals."
        meta:
          metrics:
            total_discount:
              type: sum
        tests:
          - not_null
      - name: net_amount
        description: "Net amount = sales - discount. Rounded to 2 decimals."
        meta:
          metrics:
            total_net_sales:
              type: sum
            avg_order_value:
              type: average
        tests:
          - not_null
      - name: is_return
        description: "True if this is a return transaction (by billing type or negative quantity)"
        tests:
          - not_null
      - name: is_walk_in
        description: "True if customer_id = site_code (counter/walk-in sale)"
        tests:
          - not_null
      - name: has_insurance
        description: "True if an insurance number is present on the transaction"
        tests:
          - not_null
