version: 2

sources:
  - name: bronze
    schema: bronze
    description: "Bronze layer — raw data loaded from Excel files"
    tables:
      - name: sales
        description: "Raw sales transactions from quarterly Excel exports"
        loaded_at_field: loaded_at
        freshness:
          warn_after:
            count: 48
            period: hour
          error_after:
            count: 96
            period: hour
        columns:
          - name: id
            description: "Auto-generated primary key"
          - name: source_file
            description: "Original Excel filename"
          - name: source_quarter
            description: "Quarter identifier (e.g. Q1.2023)"
          - name: date
            description: "Transaction date"
          - name: reference_no
            description: "Sales reference number"
          - name: material
            description: "Material/product code"
          - name: material_desc
            description: "Material description"
          - name: quantity
            description: "Quantity sold"
          - name: net_sales
            description: "Net sales amount"
          - name: gross_sales
            description: "Gross sales amount"
          - name: category
            description: "Product category"
          - name: brand
            description: "Product brand"
          - name: customer
            description: "Customer code"
          - name: customer_name
            description: "Customer name"
          - name: site
            description: "Site code"
          - name: site_name
            description: "Site name"
