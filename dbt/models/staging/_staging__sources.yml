version: 2

models:
  - name: stg_sales
    description: >
      Silver layer: cleaned sales data.
      Drops 19 columns from bronze, deduplicates rows, trims text,
      normalizes drug_status, standardizes billing (AR->EN),
      flags returns/walk-ins/insurance/staff presence.
    columns:
      # -- Metadata --
      - name: source_file
        description: "Original Excel filename"
      - name: source_quarter
        description: "Quarter identifier (e.g. Q1.2023)"
      - name: loaded_at
        description: "Timestamp when row was loaded into bronze"

      # -- Transaction --
      - name: invoice_id
        description: "Sales invoice reference number (from reference_no)"
        tests:
          - not_null
      - name: invoice_date
        description: "Invoice date"
        tests:
          - not_null
      - name: billing_way
        description: "Billing method (Arabic standardized to English)"
        tests:
          - not_null
          - accepted_values:
              values:
                - Credit
                - Cash
                - Delivery
                - Delivery Return
                - Credit Return
                - Cash Return
                - Pick-Up
                - Pick-Up Return
                - Delivery Credit
                - Delivery Credit Return
      - name: billing_id
        description: "Secondary billing identifier"

      # -- Product --
      - name: drug_code
        description: "Drug/material code"
        tests:
          - not_null
      - name: drug_name
        description: "Drug/material description"
      - name: drug_brand
        description: "Drug brand"
      - name: drug_cluster
        description: "Drug item cluster"
      - name: drug_status
        description: "Normalized drug status (Active, Cancelled, Delisted, New)"
        tests:
          - accepted_values:
              values:
                - Active
                - Cancelled
                - Delisted
                - New
                - Unknown
      - name: is_temporary
        description: "True if drug had -T suffix in original status (temporary listing)"

      # -- Classification --
      - name: drug_category
        description: "Drug category"
      - name: drug_subcategory
        description: "Drug subcategory"
      - name: drug_division
        description: "Business division"
      - name: drug_segment
        description: "Business segment"

      # -- Customer / Site --
      - name: customer_id
        description: "Customer code"
      - name: customer_name
        description: "Customer name (# patterns cleaned to Unknown)"
      - name: site_code
        description: "Site code"
      - name: site_name
        description: "Site name"
      - name: buyer
        description: "Buyer identifier"

      # -- Personnel --
      - name: staff_id
        description: "Staff personnel number"
      - name: staff_name
        description: "Staff name"
      - name: staff_position
        description: "Staff job position"
      - name: area_manager
        description: "Area manager"

      # -- Financial --
      - name: quantity
        description: "Quantity sold (negative for returns)"
      - name: sales
        description: "Gross sales amount (negative for returns)"
      - name: discount
        description: "Discount amount (subtotal5)"
      - name: net_amount
        description: "Net amount (sales - discount)"

      # -- Derived --
      - name: invoice_year
        description: "Year extracted from invoice_date"
      - name: invoice_month
        description: "Month extracted from invoice_date"
      - name: invoice_quarter
        description: "Quarter extracted from invoice_date"
      - name: is_return
        description: "True if return (by billing_way OR negative quantity)"
      - name: has_insurance
        description: "True if insurance_no is present"
      - name: is_walk_in
        description: "True if customer_id = site_code (counter/walk-in sale)"
      - name: has_staff
        description: "True if staff personnel number is present"

      # -- Insurance --
      - name: insurance_tel
        description: "Insurance telephone"
      - name: insurance_no
        description: "Insurance number"
