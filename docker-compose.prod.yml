# Production overlay — Cloudflare Full Mode + Nginx reverse proxy
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Replaces Traefik with Nginx for Cloudflare compatibility (Docker 29+).
# SSL terminated by Cloudflare (Full mode) with self-signed origin cert.
# Generate cert: openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#   -keyout traefik/certs/origin.key -out traefik/certs/origin.crt \
#   -subj "/CN=smartdatapulse.tech" \
#   -addext "subjectAltName=DNS:smartdatapulse.tech,DNS:*.smartdatapulse.tech"

services:
  # ---------- Nginx Reverse Proxy (replaces Traefik) ----------
  nginx:
    image: nginx:1.27-alpine
    container_name: datapulse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"  # Internal health-check port (localhost only)
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./traefik/certs:/etc/nginx/certs:ro
      - ./nginx/errors:/usr/share/nginx/html/errors:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - frontend-net
      - backend

  # ---------- API: GHCR image, remove direct port ----------
  api:
    image: ghcr.io/ahmed-shaaban-94/data-pulse/api:${IMAGE_TAG:?IMAGE_TAG is required for production}
    ports: !reset []
    environment:
      SENTRY_ENVIRONMENT: production
      API_KEY: ${API_KEY:?API_KEY is required for production}
      PIPELINE_WEBHOOK_SECRET: ${PIPELINE_WEBHOOK_SECRET:?PIPELINE_WEBHOOK_SECRET is required for production}
    command: [
      "uvicorn", "datapulse.api.app:create_app",
      "--host", "0.0.0.0", "--port", "8000", "--factory",
      "--workers", "4",
      "--timeout-graceful-shutdown", "30",
      "--timeout-keep-alive", "75"
    ]
    deploy:
      resources:
        limits:
          memory: 3G
    networks:
      - backend
      - frontend-net

  # ---------- Frontend: GHCR image, remove direct port ----------
  frontend:
    image: ghcr.io/ahmed-shaaban-94/data-pulse/frontend:${IMAGE_TAG:?IMAGE_TAG is required for production}
    ports: !reset []
    environment:
      - NEXT_PUBLIC_API_URL=
      - INTERNAL_API_URL=http://api:8000
      - NEXTAUTH_URL=https://${DOMAIN:-smartdatapulse.tech}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in production}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
    labels: []
    networks:
      - frontend-net

  # ---------- Remove dev-only ports from internal services ----------
  postgres:
    ports: !reset []

  # celery-worker removed — async queries now run in-process
  # prestart removed — migrations now run inside API entrypoint

  # n8n removed — orchestration now in-process via datapulse.scheduler

