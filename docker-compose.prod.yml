# Production overlay — Cloudflare Full Mode + Nginx reverse proxy
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Replaces Traefik with Nginx for Cloudflare compatibility (Docker 29+).
# SSL terminated by Cloudflare (Full mode) with self-signed origin cert.
# Generate cert: openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#   -keyout traefik/certs/origin.key -out traefik/certs/origin.crt \
#   -subj "/CN=smartdatapulse.tech" \
#   -addext "subjectAltName=DNS:smartdatapulse.tech,DNS:*.smartdatapulse.tech"

services:
  # ---------- Nginx Reverse Proxy (replaces Traefik) ----------
  nginx:
    image: nginx:1.27-alpine
    container_name: datapulse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./traefik/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - frontend-net
      - backend

  # ---------- API: GHCR image, remove direct port ----------
  api:
    image: ghcr.io/ahmed-shaaban-94/saas/api:${IMAGE_TAG:-latest}
    ports: !reset []
    command: ["uvicorn", "datapulse.api.app:create_app", "--host", "0.0.0.0", "--port", "8000", "--factory", "--workers", "2"]
    networks:
      - backend
      - frontend-net

  # ---------- Frontend: GHCR image, remove direct port ----------
  frontend:
    image: ghcr.io/ahmed-shaaban-94/saas/frontend:${IMAGE_TAG:-latest}
    ports: !reset []
    environment:
      - NEXT_PUBLIC_API_URL=
      - INTERNAL_API_URL=http://api:8000
      - NEXTAUTH_URL=https://${DOMAIN:-smartdatapulse.tech}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in production}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
    labels: []
    networks:
      - frontend-net

  # ---------- Remove dev-only ports from internal services ----------
  postgres:
    ports: !reset []

  pgadmin:
    ports: !reset []
    profiles: ["dev"]
    networks:
      - backend

  # ---------- Prestart + Celery: GHCR image ----------
  prestart:
    image: ghcr.io/ahmed-shaaban-94/saas/api:${IMAGE_TAG:-latest}

  # celery-worker removed — async queries now run in-process

  n8n:
    ports: !reset []

  app:
    ports: !reset []
    profiles: ["dev"]
    networks:
      - backend
