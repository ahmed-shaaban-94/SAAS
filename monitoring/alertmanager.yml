global:
  # How long to wait before re-sending a resolved alert notification
  resolve_timeout: 5m

route:
  # Top-level receiver — gets everything not matched by a child route
  receiver: blackhole
  group_by: [alertname, severity]
  group_wait: 30s       # Wait to batch alerts that fire together
  group_interval: 5m    # Minimum time between grouped notifications
  repeat_interval: 4h   # Re-alert if still firing after 4 hours

  routes:
    # Critical alerts — shorter repeat interval, alert immediately
    - matchers:
        - severity = critical
      receiver: blackhole
      repeat_interval: 1h

receivers:
  # Null receiver — alerts are received but no notifications sent.
  # To enable Slack, replace with slack_configs and set SLACK_WEBHOOK_URL.
  - name: blackhole

templates: []
