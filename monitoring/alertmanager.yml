global:
  # How long to wait before re-sending a resolved alert notification
  resolve_timeout: 5m

route:
  # Top-level receiver — gets everything not matched by a child route
  receiver: slack-default
  group_by: [alertname, severity]
  group_wait: 30s       # Wait to batch alerts that fire together
  group_interval: 5m    # Minimum time between grouped notifications
  repeat_interval: 4h   # Re-alert if still firing after 4 hours

  routes:
    # Critical alerts — shorter repeat interval, alert immediately
    - matchers:
        - severity = critical
      receiver: slack-critical
      repeat_interval: 1h

receivers:
  - name: slack-default
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alerts"
        username: "Prometheus"
        icon_emoji: ":warning:"
        title: '{{ template "slack.default.title" . }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Since:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}
        send_resolved: true

  - name: slack-critical
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alerts"
        username: "Prometheus"
        icon_emoji: ":rotating_light:"
        title: ':rotating_light: CRITICAL: {{ template "slack.default.title" . }}'
        text: |
          <!channel>
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Since:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}
        send_resolved: true

templates: []
