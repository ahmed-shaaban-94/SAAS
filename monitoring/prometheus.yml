global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: "datapulse-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    scrape_interval: 10s

  - job_name: "nginx-health"
    metrics_path: /nginx-health
    static_configs:
      - targets: ["nginx:8080"]
    scrape_interval: 30s
