apiVersion: 1

datasources:
  # Prometheus — metrics from API, n8n, etc.
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # PostgreSQL — direct query access to marts/analytics
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: datapulse
    user: datapulse
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
    editable: false
