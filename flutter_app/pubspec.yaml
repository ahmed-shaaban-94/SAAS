name: datapulse
description: DataPulse - Business & Sales Analytics Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  pretty_dio_logger: ^1.3.1

  # Routing
  go_router: ^13.0.1

  # Charts
  fl_chart: ^0.66.2

  # Auth
  auth0_flutter: ^2.0.0-beta.1
  flutter_secure_storage: ^9.0.0

  # JSON Serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # UI Components
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  intl: ^0.20.2
  pull_to_refresh: ^2.0.0
  adaptive_theme: ^3.5.0

  # Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # Utils
  url_launcher: ^6.2.2
  connectivity_plus: ^5.0.2
  package_info_plus: ^9.0.1
  logger: ^2.0.2+1
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  retrofit_generator: ^8.0.6
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
